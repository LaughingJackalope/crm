# Schema Registry & Serialization Specification
# Apicurio Registry + Avro + Kafka
# Version: 1.0.0

meta:
  registry: Apicurio Registry 3.x
  serialization: Avro (binary)
  transport: Kafka
  compatibility: FULL (Backward + Forward)

  rationale: |
    Avro provides compact binary serialization with strong typing and
    built-in schema evolution. Apicurio Registry (deployed in-cluster)
    enforces compatibility rules at registration time, preventing a team
    from deploying a schema change that would break downstream consumers.
    FULL compatibility ensures both old and new consumers can read data
    serialized with either schema version.

# ═══════════════════════════════════════════════════════════════════════
# Registry Configuration
# ═══════════════════════════════════════════════════════════════════════
registry:
  deployment:
    mode: in-cluster
    platform: Kubernetes (same cluster as services)
    namespace: crm-infrastructure
    resources:
      requests: { cpu: "500m", memory: "1Gi" }
      limits: { cpu: "2", memory: "4Gi" }
      storage: "50Gi"
    replicas: 3
    notes: |
      Apicurio stores schema metadata in its own PostgreSQL database.
      Each BC team registers schemas via CI/CD pipeline, not manually.

  api:
    url: https://schema-registry.crm-infrastructure.svc.cluster.local
    validation: enabled
    mutable: false (schemas are immutable after registration)

# ═══════════════════════════════════════════════════════════════════════
# Global Compatibility Rules
# ═══════════════════════════════════════════════════════════════════════
compatibility:
  default: FULL
  rules:
    FULL:
      description: |
        Backward + Forward compatible. A new schema can read data written
        with the old schema AND the old schema can read data written with
        the new schema. This is the strictest mode and prevents independent
        team deployments from breaking each other.
      allowed_changes:
        - Adding a field with a default value
        - Removing a field that had a default value
        - Changing a field name (with alias support in Avro)
        - Adding a new enum symbol (as long as old consumers can handle unknown)
      forbidden_changes:
        - Removing a required field without a default
        - Changing a field type incompatibly (e.g., string → int)
        - Removing an enum symbol that existing consumers may depend on
        - Adding a required field without a default

  per_group_overrides: {}
    # All groups inherit FULL; no overrides needed at this stage.

# ═══════════════════════════════════════════════════════════════════════
# Schema Group Naming Convention
# ═════════════════════════════════════════════════════════════════════
groups:
  pattern: "crm.{bounded-context}"
  examples:
    - crm.ciam
    - crm.sales
    - crm.support
    - crm.marketing
    - crm.communication
    - crm.billing

# ═══════════════════════════════════════════════════════════════════════
# Artifact Naming Convention
# ═══════════════════════════════════════════════════════════════════════
artifacts:
  pattern: "{topic-name}-value"
  examples:
    - crm.ciam.customer.registered-value
    - crm.sales.opportunity.closed-value
    - crm.billing.payment.failed-value
  version_pattern: "{major}.{minor}"
  notes: |
    Each topic has exactly one value schema artifact. Key schemas are
    simple UUID strings (registered separately if needed).
    New versions are additive-only under FULL compatibility.

# ═══════════════════════════════════════════════════════════════════════
# Avro Schema Design Rules
# ═══════════════════════════════════════════════════════════════════════
avro_rules:
  - "Every record must have a doc string describing its purpose"
  - "All fields must have doc strings"
  - "Use logical types for timestamps (timestamp-millis), decimals (bytes + scale), and UUIDs (string + logicalType uuid)"
  - "Nullable fields use union types: [\"null\", \"<type>\"], with \"null\" first"
  - "Default values use the union default; the default MUST match the first non-null type"
  - "Enum types MUST include a \"UNKNOWN\" symbol (ordinal 0) for forward compatibility"
  - "Field names use snake_case; record names use PascalCase"
  - "No anonymous records — all records must be named types for registry clarity"

