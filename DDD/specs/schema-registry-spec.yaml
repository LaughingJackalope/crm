# ═══════════════════════════════════════════════════════════════════════
# Kafka Topic Configuration (derived from AsyncAPI channels)
# ═══════════════════════════════════════════════════════════════════════
kafka_defaults:
  partitions: 6
  replication_factor: 3
  retention_ms: 604800000  # 7 days
  compression_type: lz4
  cleanup_policy: delete
  min_insync_replicas: 2
  max_message_bytes: 1048576  # 1MB

  # Topics with different configs
  overrides:
    "crm.marketing.engagement.recorded":
      partitions: 12  # High throughput topic
      retention_ms: 259200000  # 3 days
    "crm.communication.message.sent":
      partitions: 12  # High throughput topic
    "crm.support.sla.breached":
      retention_ms: 2592000000  # 30 days (needs longer retention for audits)

# ═════════════════════════════════════════════════════════════════════
# Dead Letter Topic Configuration
# ═══════════════════════════════════════════════════════════════════════
dead_letter:
  pattern: "{origin-topic}.DLT"
  retention_ms: 2592000000  # 30 days
  partitions: 6
  max_message_bytes: 2097152  # 2MB (includes original headers + error info)
  notes: |
    Every consumer group that processes domain events MUST configure a DLT.
    DLT messages include the original event payload plus error context:
    error_reason, failed_at, original_topic, consumer_group, retry_count.

# ═══════════════════════════════════════════════════════════════════════
# Serialization vs. API Contracts — Shared Types
# ═══════════════════════════════════════════════════════════════════════
shared_types:
  Money:
    avro_type:
      type: record
      name: Money
      fields:
        - name: amount
          type: { type: bytes, logicalType: decimal, precision: 14, scale: 2 }
        - name: currency
          type: { type: string, logicalType: uuid }
          doc: "ISO 4217 currency code"
    note: |
      Mapped to OpenAPI Money schema for REST API consistency.
      Avro uses decimal logical type for exact precision.

  EventHeaders:
    avro_type:
      type: record
      name: EventHeaders
      fields:
        - name: event_id
          type: { type: string, logicalType: uuid }
        - name: event_type
          type: string
        - name: source
          type:
            type: enum
            name: Source
            symbols: [ciam, sales, support, marketing, communication, billing]
        - name: timestamp
          type: { type: long, logicalType: timestamp-millis }
        - name: correlation_id
          type: { type: string, logicalType: uuid }
        - name: causation_id
          type: ["null", { type: string, logicalType: uuid }]
          default: null
        - name: schema_version
          type: string
        - name: idempotency_key
          type: ["null", { type: string, logicalType: uuid }]
          default: null
