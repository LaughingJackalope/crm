openapi: 3.1.0
info:
  title: Sales / Opportunity Pipeline API
  description: |
    Manages the end-to-end sales process from qualified lead to closed deal.
    Owns opportunities, quotes, products, and revenue forecasting.
    References Customers and Accounts by ID — never duplicates their data.
  version: 1.0.0
  contact:
    name: CRM Platform Team
  license:
    name: Proprietary

servers:
  - url: https://api.crm.example.com/v1
    description: Production
  - url: https://staging-api.crm.example.com/v1
    description: Staging

tags:
  - name: Opportunities
    description: Sales deals being pursued with specific accounts and contacts.
  - name: Quotes
    description: Formal price proposals sent to customers for opportunities.
  - name: Products
    description: Sellable items or services with pricing.
  - name: Forecast
    description: Revenue projections based on pipeline state.

paths:
  # ── Opportunities ──────────────────────────────────────────────────────
  /opportunities:
    get:
      operationId: listOpportunities
      summary: List opportunities
      description: Retrieve a paginated list of opportunities with optional filtering.
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: stage
          in: query
          schema:
            type: string
        - name: ownerId
          in: query
          schema:
            type: string
            format: uuid
        - name: customerId
          in: query
          description: Filter by customer reference.
          schema:
            type: string
            format: uuid
        - name: accountId
          in: query
          description: Filter by account reference.
          schema:
            type: string
            format: uuid
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, -createdAt, name, -name, amount, -amount, expectedCloseDate, -expectedCloseDate]
            default: -createdAt
      responses:
        '200':
          description: Paginated list of opportunities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOpportunities'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    post:
      operationId: createOpportunity
      summary: Create a new opportunity
      description: |
        Open a new Opportunity linked to a qualified Customer/Account.
        Emits `OpportunityCreated` domain event on success.
      tags: [Opportunities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOpportunityRequest'
      responses:
        '201':
          description: Opportunity created successfully.
          headers:
            Location:
              schema:
                type: string
              description: URI of the created opportunity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /opportunities/{opportunityId}:
    get:
      operationId: getOpportunity
      summary: Get an opportunity by ID
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/OpportunityIdParam'
      responses:
        '200':
          description: Opportunity details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateOpportunity
      summary: Update an opportunity
      description: Partially update opportunity attributes. Only provided fields are mutated.
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/OpportunityIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOpportunityRequest'
      responses:
        '200':
          description: Opportunity updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /opportunities/{opportunityId}/advance-stage:
    post:
      operationId: advanceStage
      summary: Advance opportunity to next stage
      description: |
        Move an Opportunity to the next Stage in the pipeline.
        Emits `OpportunityStageAdvanced` domain event.
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/OpportunityIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Stage advanced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /opportunities/{opportunityId}/close:
    post:
      operationId: closeOpportunity
      summary: Close an opportunity
      description: |
        Mark an Opportunity as Closed Won or Closed Lost with a reason.
        Emits `OpportunityClosed` domain event.
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/OpportunityIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseOpportunityRequest'
      responses:
        '200':
          description: Opportunity closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /opportunities/{opportunityId}/reassign:
    post:
      operationId: reassignOwner
      summary: Reassign opportunity owner
      description: |
        Change the Sales Rep responsible for an Opportunity.
        Emits `OwnerReassigned` domain event.
      tags: [Opportunities]
      parameters:
        - $ref: '#/components/parameters/OpportunityIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReassignOwnerRequest'
      responses:
        '200':
          description: Owner reassigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpportunityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Quotes ─────────────────────────────────────────────────────────────
  /opportunities/{opportunityId}/quotes:
    get:
      operationId: listQuotes
      summary: List quotes for an opportunity
      description: Retrieve a paginated list of quotes for a specific opportunity.
      tags: [Quotes]
      parameters:
        - $ref: '#/components/parameters/OpportunityIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of quotes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedQuotes'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      operationId: generateQuote
      summary: Generate a quote
      description: |
        Create a Quote with Line Items for an Opportunity.
        Emits `QuoteGenerated` domain event.
      tags: [Quotes]
      parameters:
        - $ref: '#/components/parameters/OpportunityIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateQuoteRequest'
      responses:
        '201':
          description: Quote generated.
          headers:
            Location:
              schema:
                type: string
              description: URI of the created quote.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /quotes/{quoteId}:
    get:
      operationId: getQuote
      summary: Get a quote by ID
      tags: [Quotes]
      parameters:
        - $ref: '#/components/parameters/QuoteIdParam'
      responses:
        '200':
          description: Quote details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /quotes/{quoteId}/send:
    post:
      operationId: sendQuote
      summary: Send a quote
      description: |
        Mark a Quote as Sent and notify the customer.
        Emits `QuoteSent` domain event.
      tags: [Quotes]
      parameters:
        - $ref: '#/components/parameters/QuoteIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Quote sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /quotes/{quoteId}/accept:
    post:
      operationId: acceptQuote
      summary: Accept a quote
      description: |
        Customer accepts a quote — triggers Opportunity advancement.
        Emits `QuoteAccepted` domain event.
      tags: [Quotes]
      parameters:
        - $ref: '#/components/parameters/QuoteIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Quote accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Products ───────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      summary: List products
      description: Retrieve a paginated list of products with optional filtering.
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: category
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated list of products.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProducts'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: createProduct
      summary: Create a product
      description: Admin-only product creation. Adds a new product to the catalog.
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created.
          headers:
            Location:
              schema:
                type: string
              description: URI of the created product.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /products/{productId}:
    get:
      operationId: getProduct
      summary: Get a product by ID
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '200':
          description: Product details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateProduct
      summary: Update a product
      description: Partially update product attributes. Only provided fields are mutated.
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Forecast ───────────────────────────────────────────────────────────
  /forecast:
    get:
      operationId: getForecast
      summary: Get sales forecast
      description: |
        Returns aggregated pipeline projection based on current opportunity stages
        and probabilities. Emits `ForecastUpdated` domain event.
      tags: [Forecast]
      parameters:
        - name: ownerId
          in: query
          description: Filter forecast by sales rep.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sales forecast data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForecastResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  # ── Parameters ────────────────────────────────────────────────────────
  parameters:
    OpportunityIdParam:
      name: opportunityId
      in: path
      required: true
      description: Unique identifier of the opportunity.
      schema:
        type: string
        format: uuid

    QuoteIdParam:
      name: quoteId
      in: path
      required: true
      description: Unique identifier of the quote.
      schema:
        type: string
        format: uuid

    ProductIdParam:
      name: productId
      in: path
      required: true
      description: Unique identifier of the product.
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      description: Page number (1-indexed).
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  # ── Schemas ───────────────────────────────────────────────────────────
  schemas:
    # Value Objects
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          format: double
          minimum: 0
          description: Monetary amount with 2 decimal precision.
          example: 1299.99
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code.
          example: "USD"

    LineItem:
      type: object
      required: [productId, productName, quantity, unitPrice]
      properties:
        productId:
          type: string
          format: uuid
          description: Reference to a Product.
        productName:
          type: string
          description: Denormalized product name at time of quote.
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          $ref: '#/components/schemas/Money'
        discountPercent:
          type: number
          format: double
          minimum: 0
          maximum: 100
          default: 0
        totalPrice:
          $ref: '#/components/schemas/Money'

    StageDefinition:
      type: object
      required: [name, order, probability, isClosed]
      properties:
        name:
          type: string
          example: "Proposal"
        order:
          type: integer
          minimum: 0
          description: Position in the pipeline sequence.
        probability:
          type: integer
          minimum: 0
          maximum: 100
          description: Win probability percentage for this stage.
        isClosed:
          type: boolean
          description: Whether this stage represents a terminal state.
        isWon:
          type: boolean
          description: Whether this closed stage represents a win. Only meaningful when isClosed is true.

    WinLossReason:
      type: object
      required: [category]
      properties:
        category:
          type: string
          enum: [price, features, timing, competitor, lost_contact, no_decision, other]
        detail:
          type: string
          maxLength: 1000
          description: Free-text explanation.

    # Request Bodies
    CreateOpportunityRequest:
      type: object
      required: [customerId, accountId, name, amount, expectedCloseDate]
      properties:
        customerId:
          type: string
          format: uuid
          description: Reference to the customer (qualified lead).
        accountId:
          type: string
          format: uuid
          description: Reference to the parent account.
        name:
          type: string
          minLength: 1
          maxLength: 300
        amount:
          $ref: '#/components/schemas/Money'
        expectedCloseDate:
          type: string
          format: date
        ownerId:
          type: string
          format: uuid
          description: Sales rep assigned to this opportunity.

    UpdateOpportunityRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        amount:
          $ref: '#/components/schemas/Money'
        expectedCloseDate:
          type: string
          format: date

    CloseOpportunityRequest:
      type: object
      required: [outcome, winLossReason]
      properties:
        outcome:
          type: string
          enum: [won, lost]
        winLossReason:
          $ref: '#/components/schemas/WinLossReason'

    ReassignOwnerRequest:
      type: object
      required: [newOwnerId]
      properties:
        newOwnerId:
          type: string
          format: uuid
          description: The sales rep to assign.

    GenerateQuoteRequest:
      type: object
      required: [lineItems]
      properties:
        lineItems:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItem'
        validUntil:
          type: string
          format: date
          description: Expiration date for the quote.

    CreateProductRequest:
      type: object
      required: [name, unitPrice]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        description:
          type: string
          maxLength: 2000
        unitPrice:
          $ref: '#/components/schemas/Money'
        isActive:
          type: boolean
          default: true
        category:
          type: string

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        description:
          type: string
          maxLength: 2000
        unitPrice:
          $ref: '#/components/schemas/Money'
        isActive:
          type: boolean
        category:
          type: string

    # Response Bodies
    OpportunityResponse:
      type: object
      required: [opportunityId, customerId, accountId, name, stage, amount, probability, expectedCloseDate, ownerId, createdAt, updatedAt]
      properties:
        opportunityId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
          description: Reference to the customer.
        accountId:
          type: string
          format: uuid
          description: Reference to the parent account.
        name:
          type: string
        stage:
          type: string
          description: Current pipeline stage name.
        amount:
          $ref: '#/components/schemas/Money'
        probability:
          type: integer
          minimum: 0
          maximum: 100
        expectedCloseDate:
          type: string
          format: date
        ownerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    QuoteResponse:
      type: object
      required: [quoteId, opportunityId, status, lineItems, totalAmount, createdAt]
      properties:
        quoteId:
          type: string
          format: uuid
        opportunityId:
          type: string
          format: uuid
        status:
          type: string
          enum: [Draft, Sent, Accepted, Rejected]
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        validUntil:
          type: string
          format: date
          nullable: true
        totalAmount:
          $ref: '#/components/schemas/Money'
        createdAt:
          type: string
          format: date-time

    ProductResponse:
      type: object
      required: [productId, name, unitPrice, isActive]
      properties:
        productId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        unitPrice:
          $ref: '#/components/schemas/Money'
        isActive:
          type: boolean
        category:
          type: string
          nullable: true

    ForecastByStage:
      type: object
      required: [stage, count, weightedAmount, unweightedAmount]
      properties:
        stage:
          type: string
        count:
          type: integer
          minimum: 0
        weightedAmount:
          $ref: '#/components/schemas/Money'
        unweightedAmount:
          $ref: '#/components/schemas/Money'

    ForecastResponse:
      type: object
      required: [totalWeightedRevenue, totalUnweightedRevenue, byStage]
      properties:
        totalWeightedRevenue:
          $ref: '#/components/schemas/Money'
        totalUnweightedRevenue:
          $ref: '#/components/schemas/Money'
        byStage:
          type: array
          items:
            $ref: '#/components/schemas/ForecastByStage'

    PaginatedOpportunities:
      type: object
      required: [items, page, pageSize, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OpportunityResponse'
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    PaginatedQuotes:
      type: object
      required: [items, page, pageSize, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/QuoteResponse'
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    PaginatedProducts:
      type: object
      required: [items, page, pageSize, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    # Error Models
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error description.
        target:
          type: string
          description: The field or parameter that caused the error.
        details:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              target:
                type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

  # ── Responses ─────────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request — malformed parameters or body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "invalid_request"
              message: "Request validation failed."
              details:
                - code: "invalid_format"
                  message: "Field 'amount' must be a positive number."
                  target: "amount"

    Unauthorized:
      description: Authentication required or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "unauthorized"
              message: "Valid authentication credentials are required."

    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "not_found"
              message: "Opportunity not found."
              target: "opportunityId"

    Conflict:
      description: Resource conflict — invalid stage transition or concurrent modification.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "conflict"
              message: "Opportunity is already closed."

    UnprocessableEntity:
      description: Request is well-formed but violates business rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "unprocessable"
              message: "Cannot advance stage: opportunity is already at the final stage."

  # ── Security ──────────────────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token issued by the CIAM auth service.
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for service-to-service authentication.

security:
  - bearerAuth: []
