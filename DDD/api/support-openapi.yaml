openapi: 3.1.0
info:
  title: Support / Ticketing API
  description: |
    Manages customer support interactions — ticket creation, assignment,
    escalation, resolution, and SLA tracking. Owns the support lifecycle
    end-to-end. References Customers by ID — never duplicates their data.
  version: 1.0.0
  contact:
    name: CRM Platform Team
  license:
    name: Proprietary

servers:
  - url: https://api.crm.example.com/v1
    description: Production
  - url: https://staging-api.crm.example.com/v1
    description: Staging

tags:
  - name: Tickets
    description: Support request lifecycle management.
  - name: Comments
    description: Public and internal comments on tickets.
  - name: Queues
    description: Prioritized lists of unassigned or grouped tickets.
  - name: SLA
    description: Service Level Agreement tracking and breach detection.
  - name: CSAT
    description: Customer Satisfaction scoring on ticket closure.

paths:
  # ── Tickets ────────────────────────────────────────────────────────────
  /tickets:
    get:
      operationId: listTickets
      summary: List tickets
      description: Retrieve a paginated list of tickets with optional filtering.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TicketStatus'
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/TicketPriority'
        - name: assigneeId
          in: query
          schema:
            type: string
            format: uuid
        - name: queueId
          in: query
          schema:
            type: string
            format: uuid
        - name: requesterId
          in: query
          description: Filter by customer reference.
          schema:
            type: string
            format: uuid
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, -createdAt, priority, -priority, updatedAt, -updatedAt]
            default: -createdAt
      responses:
        '200':
          description: Paginated list of tickets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTickets'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    post:
      operationId: createTicket
      summary: Create a new ticket
      description: |
        Open a new support ticket from a customer request.
        Emits `TicketCreated` domain event on success.
      tags: [Tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '201':
          description: Ticket created successfully.
          headers:
            Location:
              schema:
                type: string
              description: URI of the created ticket.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}:
    get:
      operationId: getTicket
      summary: Get a ticket by ID
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      responses:
        '200':
          description: Ticket details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateTicket
      summary: Update a ticket
      description: Partially update ticket attributes. Only provided fields are mutated.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTicketRequest'
      responses:
        '200':
          description: Ticket updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/assign:
    post:
      operationId: assignTicket
      summary: Assign a ticket
      description: |
        Assign a ticket to a specific agent or queue.
        Emits `TicketAssigned` domain event.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTicketRequest'
      responses:
        '200':
          description: Ticket assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/comments:
    get:
      operationId: listComments
      summary: List comments on a ticket
      description: Retrieve a paginated list of comments for a specific ticket.
      tags: [Comments]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of comments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedComments'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      operationId: addComment
      summary: Add a comment
      description: |
        Add a public or internal comment to a ticket.
        Emits `TicketCommentAdded` domain event.
      tags: [Comments]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCommentRequest'
      responses:
        '201':
          description: Comment added.
          headers:
            Location:
              schema:
                type: string
              description: URI of the created comment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/change-priority:
    post:
      operationId: changePriority
      summary: Change ticket priority
      description: |
        Update the priority level (triggers SLA recalculation).
        Emits `TicketPriorityChanged` domain event.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePriorityRequest'
      responses:
        '200':
          description: Priority changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/escalate:
    post:
      operationId: escalateTicket
      summary: Escalate a ticket
      description: |
        Escalate to a higher tier or manager.
        Emits `TicketEscalated` domain event.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscalateTicketRequest'
      responses:
        '200':
          description: Ticket escalated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/resolve:
    post:
      operationId: resolveTicket
      summary: Resolve a ticket
      description: |
        Mark ticket as resolved with a resolution summary.
        Emits `TicketResolved` domain event.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveTicketRequest'
      responses:
        '200':
          description: Ticket resolved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/close:
    post:
      operationId: closeTicket
      summary: Close a ticket
      description: |
        Finalize a resolved ticket; trigger CSAT survey.
        Emits `TicketClosed` domain event.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Ticket closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/reopen:
    post:
      operationId: reopenTicket
      summary: Reopen a ticket
      description: |
        Reopen a closed ticket if the issue recurs.
        Emits `TicketReopened` domain event.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReopenTicketRequest'
      responses:
        '200':
          description: Ticket reopened.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/apply-macro:
    post:
      operationId: applyMacro
      summary: Apply a macro
      description: Apply a predefined macro (template + actions) to a ticket.
      tags: [Tickets]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyMacroRequest'
      responses:
        '200':
          description: Macro applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /tickets/{ticketId}/csat:
    post:
      operationId: submitCSAT
      summary: Submit CSAT rating
      description: |
        Record a customer satisfaction rating for a closed ticket.
        Emits `CSATSubmitted` domain event.
      tags: [CSAT]
      parameters:
        - $ref: '#/components/parameters/TicketIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitCSATRequest'
      responses:
        '201':
          description: CSAT submitted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CSATRating'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Queues ─────────────────────────────────────────────────────────────
  /queues:
    get:
      operationId: listQueues
      summary: List queues
      description: Retrieve all support queues.
      tags: [Queues]
      responses:
        '200':
          description: List of queues.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/QueueResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /queues/{queueId}:
    get:
      operationId: getQueue
      summary: Get a queue by ID
      tags: [Queues]
      parameters:
        - $ref: '#/components/parameters/QueueIdParam'
      responses:
        '200':
          description: Queue details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /queues/{queueId}/tickets:
    get:
      operationId: listQueueTickets
      summary: List tickets in a queue
      description: Retrieve a paginated list of tickets assigned to a specific queue.
      tags: [Queues]
      parameters:
        - $ref: '#/components/parameters/QueueIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of tickets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTickets'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  # ── Parameters ────────────────────────────────────────────────────────
  parameters:
    TicketIdParam:
      name: ticketId
      in: path
      required: true
      description: Unique identifier of the ticket.
      schema:
        type: string
        format: uuid

    QueueIdParam:
      name: queueId
      in: path
      required: true
      description: Unique identifier of the queue.
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      description: Page number (1-indexed).
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  # ── Schemas ───────────────────────────────────────────────────────────
  schemas:
    # Enums
    TicketStatus:
      type: string
      enum: [Open, Pending, Resolved, Closed]
      description: Current state of the ticket.

    TicketPriority:
      type: string
      enum: [Low, Medium, High, Critical]
      description: Urgency level of the ticket.

    # Value Objects
    SLAPolicy:
      type: object
      required: [priority, firstResponseTime, resolutionTime]
      properties:
        priority:
          $ref: '#/components/schemas/TicketPriority'
        firstResponseTime:
          type: string
          description: ISO 8601 duration for first response target.
          example: "PT4H"
        resolutionTime:
          type: string
          description: ISO 8601 duration for resolution target.
          example: "PT24H"
        businessHoursOnly:
          type: boolean
          default: true
          description: Whether SLA timers count only business hours.

    SLAStatus:
      type: object
      required: [isBreached]
      properties:
        isBreached:
          type: boolean
          description: Whether the SLA has been breached.
        breachTime:
          type: string
          format: date-time
          nullable: true
          description: When the SLA was breached.
        timeRemaining:
          type: string
          nullable: true
          description: ISO 8601 duration until SLA breach. Null if already breached.
          example: "PT2H30M"

    CSATRating:
      type: object
      required: [score, submittedAt]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
          description: Satisfaction score from 1 (very dissatisfied) to 5 (very satisfied).
        comment:
          type: string
          nullable: true
          maxLength: 2000
        submittedAt:
          type: string
          format: date-time

    # Request Bodies
    CreateTicketRequest:
      type: object
      required: [requesterId, subject, description, priority]
      properties:
        requesterId:
          type: string
          format: uuid
          description: Reference to the customer who opened the ticket.
        subject:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          minLength: 1
          maxLength: 10000
        priority:
          $ref: '#/components/schemas/TicketPriority'
        queueId:
          type: string
          format: uuid
          description: Initial queue assignment.

    UpdateTicketRequest:
      type: object
      properties:
        subject:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          minLength: 1
          maxLength: 10000

    AssignTicketRequest:
      type: object
      description: At least one of assigneeId or queueId must be provided.
      properties:
        assigneeId:
          type: string
          format: uuid
          description: The support agent to assign.
        queueId:
          type: string
          format: uuid
          description: The queue to assign.

    AddCommentRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 10000
        isInternal:
          type: boolean
          default: false
          description: Internal notes are not visible to the customer.

    ChangePriorityRequest:
      type: object
      required: [priority]
      properties:
        priority:
          $ref: '#/components/schemas/TicketPriority'

    EscalateTicketRequest:
      type: object
      required: [target]
      properties:
        target:
          type: string
          description: Escalation target (e.g., tier2, manager, team_lead).
        reason:
          type: string
          maxLength: 1000

    ResolveTicketRequest:
      type: object
      required: [resolutionSummary]
      properties:
        resolutionSummary:
          type: string
          minLength: 1
          maxLength: 10000

    ReopenTicketRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000

    ApplyMacroRequest:
      type: object
      required: [macroId]
      properties:
        macroId:
          type: string
          format: uuid
          description: Reference to the macro to apply.

    SubmitCSATRequest:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 2000

    # Response Bodies
    TicketResponse:
      type: object
      required: [ticketId, requesterId, subject, description, status, priority, createdAt, updatedAt]
      properties:
        ticketId:
          type: string
          format: uuid
        requesterId:
          type: string
          format: uuid
          description: Reference to the customer who opened the ticket.
        assigneeId:
          type: string
          format: uuid
          nullable: true
          description: Reference to the assigned support agent.
        subject:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/TicketStatus'
        priority:
          $ref: '#/components/schemas/TicketPriority'
        queueId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        slaDeadline:
          type: string
          format: date-time
          nullable: true
        slaStatus:
          $ref: '#/components/schemas/SLAStatus'

    CommentResponse:
      type: object
      required: [commentId, authorId, body, isInternal, createdAt]
      properties:
        commentId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        body:
          type: string
        isInternal:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AttachmentResponse:
      type: object
      required: [attachmentId, fileName, mimeType, size, uploadedAt]
      properties:
        attachmentId:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
          minimum: 0
          description: File size in bytes.
        uploadedAt:
          type: string
          format: date-time

    QueueResponse:
      type: object
      required: [queueId, name, assignedAgents, ticketCount]
      properties:
        queueId:
          type: string
          format: uuid
        name:
          type: string
        assignedAgents:
          type: array
          items:
            type: string
            format: uuid
          description: List of agent user IDs assigned to this queue.
        ticketCount:
          type: integer
          minimum: 0

    PaginatedTickets:
      type: object
      required: [items, page, pageSize, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TicketResponse'
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    PaginatedComments:
      type: object
      required: [items, page, pageSize, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommentResponse'
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    # Error Models
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error description.
        target:
          type: string
          description: The field or parameter that caused the error.
        details:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              target:
                type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

  # ── Responses ─────────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request — malformed parameters or body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "invalid_request"
              message: "Request validation failed."
              details:
                - code: "invalid_format"
                  message: "Field 'priority' must be one of: Low, Medium, High, Critical."
                  target: "priority"

    Unauthorized:
      description: Authentication required or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "unauthorized"
              message: "Valid authentication credentials are required."

    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "not_found"
              message: "Ticket not found."
              target: "ticketId"

    Conflict:
      description: Resource conflict — invalid state transition or concurrent modification.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "conflict"
              message: "Ticket is already closed."

    UnprocessableEntity:
      description: Request is well-formed but violates business rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "unprocessable"
              message: "Cannot close a ticket that is not in Resolved status."

  # ── Security ──────────────────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token issued by the CIAM auth service.
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
