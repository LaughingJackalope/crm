openapi: 3.1.0
info:
  title: Marketing / Campaigns API
  description: |
    Plans, executes, and measures marketing campaigns. Manages audience
    segmentation, campaign lifecycle, and engagement metrics.
    Consumes Customer IDs and Consent from CIAM.
  version: 1.0.0
  contact:
    name: CRM Platform Team
  license:
    name: Proprietary

servers:
  - url: https://api.crm.example.com/v1
    description: Production
  - url: https://staging-api.crm.example.com/v1
    description: Staging

tags:
  - name: Campaigns
    description: Marketing campaign lifecycle management.
  - name: Segments
    description: Audience segmentation and targeting.
  - name: Engagements
    description: Tracked customer interactions with campaigns.
  - name: A/B Testing
    description: A/B test configuration and winner selection.

paths:
  # ── Campaigns ──────────────────────────────────────────────────────────
  /campaigns:
    get:
      operationId: listCampaigns
      summary: List campaigns
      description: Retrieve a paginated list of campaigns with optional filtering.
      tags: [Campaigns]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CampaignStatus'
        - name: channel
          in: query
          schema:
            $ref: '#/components/schemas/Channel'
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, -createdAt, name, -name, startDate, -startDate]
            default: -createdAt
      responses:
        '200':
          description: Paginated list of campaigns.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampaigns'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    post:
      operationId: createCampaign
      summary: Create a campaign
      description: |
        Define a new campaign with objective, channel, and audience.
        Emits `CampaignCreated` domain event on success.
      tags: [Campaigns]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCampaignRequest'
      responses:
        '201':
          description: Campaign created.
          headers:
            Location:
              schema:
                type: string
              description: URI of the created campaign.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /campaigns/{campaignId}:
    get:
      operationId: getCampaign
      summary: Get a campaign by ID
      tags: [Campaigns]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      responses:
        '200':
          description: Campaign details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateCampaign
      summary: Update a campaign
      description: Partially update campaign attributes. Only provided fields are mutable.
      tags: [Campaigns]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCampaignRequest'
      responses:
        '200':
          description: Campaign updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /campaigns/{campaignId}/schedule:
    post:
      operationId: scheduleCampaign
      summary: Schedule a campaign
      description: |
        Set the send date/time for an approved campaign.
        Emits `CampaignScheduled` domain event.
      tags: [Campaigns]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Campaign scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /campaigns/{campaignId}/launch:
    post:
      operationId: launchCampaign
      summary: Launch a campaign
      description: |
        Activate a scheduled campaign — begin delivery.
        Emits `CampaignLaunched` domain event.
      tags: [Campaigns]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Campaign launched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /campaigns/{campaignId}/pause:
    post:
      operationId: pauseCampaign
      summary: Pause a campaign
      description: |
        Temporarily halt an active campaign.
        Emits `CampaignPaused` domain event.
      tags: [Campaigns]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Campaign paused.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /campaigns/{campaignId}/complete:
    post:
      operationId: completeCampaign
      summary: Complete a campaign
      description: |
        Finalize a campaign and compute final metrics.
        Emits `CampaignCompleted` domain event.
      tags: [Campaigns]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Campaign completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /campaigns/{campaignId}/metrics:
    get:
      operationId: getCampaignMetrics
      summary: Get campaign metrics
      description: Returns aggregated engagement and conversion metrics for a campaign.
      tags: [Campaigns]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      responses:
        '200':
          description: Campaign metrics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignMetrics'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /campaigns/{campaignId}/engagements:
    post:
      operationId: recordEngagement
      summary: Record an engagement
      description: |
        Log an engagement event from a channel webhook.
        Emits `EngagementRecorded` domain event.
      tags: [Engagements]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordEngagementRequest'
      responses:
        '201':
          description: Engagement recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /campaigns/{campaignId}/conversions:
    post:
      operationId: declareConversion
      summary: Declare a conversion
      description: |
        Record a conversion attributed to a campaign.
        Emits `ConversionDeclared` domain event.
      tags: [Engagements]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeclareConversionRequest'
      responses:
        '201':
          description: Conversion recorded.
          content:
            application/json:
              schema:
                type: object
                required: [conversionId, campaignId, customerId]
                properties:
                  conversionId:
                    type: string
                    format: uuid
                  campaignId:
                    type: string
                    format: uuid
                  customerId:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /campaigns/{campaignId}/ab-test/select-winner:
    post:
      operationId: selectABWinner
      summary: Select A/B test winner
      description: |
        Choose the winning variant and apply to remaining audience.
        Emits `ABWinnerSelected` domain event.
      tags: [A/B Testing]
      parameters:
        - $ref: '#/components/parameters/CampaignIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectABWinnerRequest'
      responses:
        '200':
          description: Winner selected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Segments ──────────────────────────────────────────────────────────
  /segments:
    get:
      operationId: listSegments
      summary: List segments
      description: Retrieve a paginated list of audience segments.
      tags: [Segments]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated list of segments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSegments'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      operationId: defineAudience
      summary: Define an audience segment
      description: |
        Build a segment from customer criteria.
        Emits `AudienceDefined` domain event.
      tags: [Segments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DefineAudienceRequest'
      responses:
        '201':
          description: Segment created.
          headers:
            Location:
              schema:
                type: string
              description: URI of the created segment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /segments/{segmentId}:
    get:
      operationId: getSegment
      summary: Get a segment by ID
      tags: [Segments]
      parameters:
        - $ref: '#/components/parameters/SegmentIdParam'
      responses:
        '200':
          description: Segment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /segments/{segmentId}/refresh:
    post:
      operationId: refreshSegment
      summary: Refresh a segment
      description: Re-evaluates dynamic segment criteria against the current customer base.
      tags: [Segments]
      parameters:
        - $ref: '#/components/parameters/SegmentIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Segment refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SegmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  # ── Parameters ────────────────────────────────────────────────────────
  parameters:
    CampaignIdParam:
      name: campaignId
      in: path
      required: true
      description: Unique identifier of the campaign.
      schema:
        type: string
        format: uuid

    SegmentIdParam:
      name: segmentId
      in: path
      required: true
      description: Unique identifier of the segment.
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      description: Page number (1-indexed).
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: pageSize
      in: query
      description: Number of items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  # ── Schemas ───────────────────────────────────────────────────────────
  schemas:
    # Enums
    CampaignStatus:
      type: string
      enum: [Draft, Scheduled, Active, Paused, Completed]
      description: Current state of the campaign.

    Channel:
      type: string
      enum: [Email, SMS, Push, Social, DirectMail]
      description: The delivery medium.

    EngagementType:
      type: string
      enum: [Open, Click, Bounce, Unsubscribe]
      description: Type of customer interaction.

    # Value Objects
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          format: double
          minimum: 0
          description: Monetary amount with 2 decimal precision.
          example: 1299.99
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code.
          example: "USD"

    ContentVariant:
      type: object
      required: [variantId, name]
      properties:
        variantId:
          type: string
          format: uuid
        name:
          type: string
          description: A/B test label (e.g., "Variant A").
        subjectLine:
          type: string
          nullable: true
        body:
          type: string
          nullable: true
        ctaText:
          type: string
          nullable: true
        isControl:
          type: boolean
          default: false
          description: Whether this is the control variant in an A/B test.

    AudienceCriteria:
      type: object
      required: [filters]
      properties:
        filters:
          type: array
          items:
            type: object
            required: [field, operator, value]
            properties:
              field:
                type: string
                description: Customer attribute to filter on.
              operator:
                type: string
                enum: [eq, neq, gt, gte, lt, lte, in, not_in, contains]
              value:
                description: Filter value (type depends on field).
          description: List of filter criteria.
        estimatedReach:
          type: integer
          minimum: 0
          description: Estimated number of customers matching these criteria.

    CampaignMetrics:
      type: object
      required: [sent, delivered, opened, clicked, bounced, unsubscribed, conversions]
      properties:
        sent:
          type: integer
          minimum: 0
        delivered:
          type: integer
          minimum: 0
        opened:
          type: integer
          minimum: 0
        clicked:
          type: integer
          minimum: 0
        bounced:
          type: integer
          minimum: 0
        unsubscribed:
          type: integer
          minimum: 0
        conversions:
          type: integer
          minimum: 0
        revenue:
          $ref: '#/components/schemas/Money'

    ABTestConfig:
      type: object
      required: [variantIds, splitPercentages, winningMetric, duration]
      properties:
        variantIds:
          type: array
          minItems: 2
          items:
            type: string
            format: uuid
        splitPercentages:
          type: array
          minItems: 2
          items:
            type: number
            format: double
            minimum: 0
            maximum: 100
          description: Percentage of audience allocated to each variant. Must sum to 100.
        winningMetric:
          type: string
          enum: [open_rate, click_rate, conversion_rate, revenue]
        duration:
          type: string
          description: ISO 8601 duration for the test period.
          example: "P7D"

    # Request Bodies
    CreateCampaignRequest:
      type: object
      required: [name, objective, channel, audienceId, startDate, endDate]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        objective:
          type: string
          minLength: 1
          maxLength: 1000
        channel:
          $ref: '#/components/schemas/Channel'
        audienceId:
          type: string
          format: uuid
          description: Reference to the target segment.
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        budget:
          $ref: '#/components/schemas/Money'
        abTestConfig:
          $ref: '#/components/schemas/ABTestConfig'

    UpdateCampaignRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        objective:
          type: string
          minLength: 1
          maxLength: 1000
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time

    DefineAudienceRequest:
      type: object
      required: [name, criteria]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
        criteria:
          $ref: '#/components/schemas/AudienceCriteria'
        isDynamic:
          type: boolean
          default: false
          description: Whether the segment auto-refreshes as customer data changes.

    RecordEngagementRequest:
      type: object
      required: [customerId, type, occurredAt]
      properties:
        customerId:
          type: string
          format: uuid
          description: Reference to the customer.
        type:
          $ref: '#/components/schemas/EngagementType'
        occurredAt:
          type: string
          format: date-time
        variantId:
          type: string
          format: uuid
          nullable: true
          description: The content variant this engagement is attributed to.
        metadata:
          type: object
          additionalProperties: true
          description: Channel-specific metadata (e.g., user agent, link URL).

    DeclareConversionRequest:
      type: object
      required: [customerId]
      properties:
        customerId:
          type: string
          format: uuid
          description: Reference to the customer.
        revenue:
          $ref: '#/components/schemas/Money'

    SelectABWinnerRequest:
      type: object
      required: [winningVariantId]
      properties:
        winningVariantId:
          type: string
          format: uuid
          description: The variant to declare as winner.

    # Response Bodies
    CampaignResponse:
      type: object
      required: [campaignId, name, objective, status, channel, audienceId, startDate, endDate, createdAt, updatedAt]
      properties:
        campaignId:
          type: string
          format: uuid
        name:
          type: string
        objective:
          type: string
        status:
          $ref: '#/components/schemas/CampaignStatus'
        channel:
          $ref: '#/components/schemas/Channel'
        audienceId:
          type: string
          format: uuid
          description: Reference to the target segment.
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        budget:
          $ref: '#/components/schemas/Money'
        abTestConfig:
          $ref: '#/components/schemas/ABTestConfig'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EngagementResponse:
      type: object
      required: [engagementId, campaignId, customerId, type, occurredAt]
      properties:
        engagementId:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
          description: Reference to the customer.
        variantId:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: '#/components/schemas/EngagementType'
        occurredAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    SegmentResponse:
      type: object
      required: [segmentId, name, criteria, isDynamic, memberCount]
      properties:
        segmentId:
          type: string
          format: uuid
        name:
          type: string
        criteria:
          $ref: '#/components/schemas/AudienceCriteria'
        isDynamic:
          type: boolean
        lastRefreshedAt:
          type: string
          format: date-time
          nullable: true
        memberCount:
          type: integer
          minimum: 0

    PaginatedCampaigns:
      type: object
      required: [items, page, pageSize, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CampaignResponse'
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    PaginatedSegments:
      type: object
      required: [items, page, pageSize, totalItems, totalPages]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SegmentResponse'
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer

    # Error Models
    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error description.
        target:
          type: string
          description: The field or parameter that caused the error.
        details:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string
              target:
                type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'

  # ── Responses ─────────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request — malformed parameters or body.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "invalid_request"
              message: "Request validation failed."
              details:
                - code: "invalid_format"
                  message: "Field 'channel' must be one of: Email, SMS, Push, Social, DirectMail."
                  target: "channel"

    Unauthorized:
      description: Authentication required or invalid credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "unauthorized"
              message: "Valid authentication credentials are required."

    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "not_found"
              message: "Campaign not found."
              target: "campaignId"

    Conflict:
      description: Resource conflict — invalid state transition or concurrent modification.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "conflict"
              message: "Campaign is already active and cannot be modified."

    UnprocessableEntity:
      description: Request is well-formed but violates business rules.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "unprocessable"
              message: "endDate must be after startDate."

  # ── Security ──────────────────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token issued by the CIAM auth service.
    apiKey:
