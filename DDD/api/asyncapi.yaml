  publishSupportTicketAssigned:
    action: send
    channel:
      $ref: '#/channels/supportTicketAssigned'
    summary: Support publishes TicketAssigned
    traits:
      - $ref: '#/components/operationTraits/kafka'

  publishSupportTicketCommentAdded:
    action: send
    channel:
      $ref: '#/channels/supportTicketCommentAdded'
    summary: Support publishes TicketCommentAdded
    traits:
      - $ref: '#/components/operationTraits/kafka'

  publishSupportTicketPriorityChanged:
    action: send
