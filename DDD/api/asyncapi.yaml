asyncapi: 3.0.0
info:
  title: CRM — Domain Events
  version: 1.0.0
  description: |
    Asynchronous event contracts for the CRM platform. Each bounded context
    publishes domain events to Kafka topics following the naming convention
    crm.{context}.{aggregate}.{event}. Events are the primary integration
    mechanism — contexts remain loosely coupled and never directly mutate
    another's aggregates.

    ## Topic Naming Convention

    Format: `crm.{bounded-context}.{aggregate-name}.{event-name}`

    - `bounded-context`: ciam | sales | support | marketing | communication | billing
    - `aggregate-name`: lowercase, hyphenated (e.g., opportunity, subscription)
    - `event-name`: lowercase, hyphenated past tense (e.g., created, closed, assigned)

    ## Consumer Groups

    Each subscribing context uses a consumer group named
    `{context}.{purpose}` (e.g., `billing.subscription-creation`).

    ## Message Headers

    All messages include a standard envelope of headers for traceability,
    schema routing, and idempotency. Payloads contain only the data necessary
    for downstream consumers to react — no full-aggregate snapshots.
  contact:
    name: CRM Platform Team
  license:
    name: Proprietary

defaultContentType: application/json

servers:
  production:
    host: kafka.crm.example.com:9093
    protocol: kafka-secure
    description: Production Kafka cluster
    security:
      - $ref: '#/components/securitySchemes/saslScram'
  staging:
    host: kafka-staging.crm.example.com:9093
    protocol: kafka-secure
    description: Staging Kafka cluster
    security:
      - $ref: '#/components/securitySchemes/saslScram'

channels:
  # ═══════════════════════════════════════════════════════════════════════
  # CIAM — Customer Identity & Access Management
  # ═══════════════════════════════════════════════════════════════════════

  ciamCustomerRegistered:
    address: crm.ciam.customer.registered
    description: |
      Published when a new contact is registered. Consumed by Sales
      (opportunity seeding), Marketing (lead ingestion), and Communication
      (welcome flow).
    messages:
      customerRegistered:
        $ref: '#/components/messages/CustomerRegistered'

  ciamLeadQualified:
    address: crm.ciam.lead.qualified
    description: |
      Published when a lead meets the qualification score threshold.
      Consumed by Sales to trigger opportunity creation.
    messages:
      leadQualified:
        $ref: '#/components/messages/LeadQualified'

  ciamCustomersMerged:
    address: crm.ciam.customer.merged
    description: |
      Published when two customer records are deduplicated. Consumed by
      all contexts to update stale references.
    messages:
      customersMerged:
        $ref: '#/components/messages/CustomersMerged'

  ciamConsentChanged:
    address: crm.ciam.consent.changed
    description: |
      Published when consent is granted or revoked for a purpose.
      Consumed by Marketing (campaign eligibility) and Communication
      (channel opt-in enforcement).
    messages:
      consentChanged:
        $ref: '#/components/messages/ConsentChanged'

  ciamEmailVerified:
    address: crm.ciam.email.verified
    description: |
      Published when a contact's email passes challenge/response verification.
      Consumed by Communication to enable email channel delivery.
    messages:
      emailVerified:
        $ref: '#/components/messages/EmailVerified'

  ciamCustomerDeactivated:
    address: crm.ciam.customer.deactivated
    description: |
      Published when a contact is soft-deleted. Consumed by Support
      (suspend open tickets), Billing (cancel subscriptions), and
      Communication (suppress outbound messages).
    messages:
      customerDeactivated:
        $ref: '#/components/messages/CustomerDeactivated'

  ciamLifecycleStageChanged:
    address: crm.ciam.lifecycle-stage.changed
    description: |
      Published when a customer transitions lifecycle stage
      (Lead → Qualified → Opportunity → Customer → Advocate/Churned).
      Consumed by Sales for pipeline stage synchronization.
    messages:
      lifecycleStageChanged:
        $ref: '#/components/messages/LifecycleStageChanged'

  # ═══════════════════════════════════════════════════════════════════════
  # Sales / Opportunity Pipeline
  # ═══════════════════════════════════════════════════════════════════════

  salesOpportunityCreated:
    address: crm.sales.opportunity.created
    description: |
      Published when a new opportunity is opened. Consumed by Communication
      for stakeholder notifications.
    messages:
      opportunityCreated:
        $ref: '#/components/messages/OpportunityCreated'

  salesOpportunityStageAdvanced:
    address: crm.sales.opportunity.stage-advanced
    description: |
      Published when an opportunity moves to the next pipeline stage.
      Consumed by Communication for status update notifications.
    messages:
      opportunityStageAdvanced:
        $ref: '#/components/messages/OpportunityStageAdvanced'

  salesOpportunityClosed:
    address: crm.sales.opportunity.closed
    description: |
      Published when an opportunity is closed (won or lost). Consumed by
      Billing (won → create subscription/invoice) and Communication
      (team notifications).
    messages:
      opportunityClosed:
        $ref: '#/components/messages/OpportunityClosed'

  salesQuoteGenerated:
    address: crm.sales.quote.generated
    description: |
      Published when a quote with line items is created for an opportunity.
      Consumed by Communication to deliver the quote to the customer.
    messages:
      quoteGenerated:
        $ref: '#/components/messages/QuoteGenerated'

  salesQuoteSent:
    address: crm.sales.quote.sent
    description: |
      Published when a quote is marked as sent to the customer.
      Consumed by Communication for delivery tracking.
    messages:
      quoteSent:
        $ref: '#/components/messages/QuoteSent'

  salesQuoteAccepted:
    address: crm.sales.quote.accepted
    description: |
      Published when a customer accepts a quote. Consumed by Billing
      to trigger subscription creation or invoice generation.
    messages:
      quoteAccepted:
        $ref: '#/components/messages/QuoteAccepted'

  salesForecastUpdated:
    address: crm.sales.forecast.updated
    description: |
      Published when the pipeline forecast is recalculated.
      Consumed by Communication for report distribution.
    messages:
      forecastUpdated:
        $ref: '#/components/messages/ForecastUpdated'

  salesOwnerReassigned:
    address: crm.sales.opportunity.owner-reassigned
    description: |
      Published when an opportunity's sales rep changes.
      Consumed by Communication to notify the new owner.
    messages:
      ownerReassigned:
        $ref: '#/components/messages/OwnerReassigned'

  # ═══════════════════════════════════════════════════════════════════════
  # Support / Ticketing
  # ═══════════════════════════════════════════════════════════════════════

  supportTicketCreated:
    address: crm.support.ticket.created
    description: |
      Published when a new support ticket is opened. Consumed by
      Communication for assignee/customer notifications.
    messages:
      ticketCreated:
        $ref: '#/components/messages/TicketCreated'

  supportTicketAssigned:
    address: crm.support.ticket.assigned
    description: |
      Published when a ticket is assigned to an agent or queue.
      Consumed by Communication for agent notification.
    messages:
      ticketAssigned:
        $ref: '#/components/messages/TicketAssigned'

  supportTicketCommentAdded:
    address: crm.support.ticket.comment-added
    description: |
      Published when a comment is added to a ticket. Consumed by
      Communication to notify the customer (public) or team (internal).
    messages:
      ticketCommentAdded:
        $ref: '#/components/messages/TicketCommentAdded'

  supportTicketPriorityChanged:
    address: crm.support.ticket.priority-changed
    description: |
      Published when a ticket's priority is updated. Consumed by
      Communication for SLA breach alerts.
    messages:
      ticketPriorityChanged:
        $ref: '#/components/messages/TicketPriorityChanged'

  supportTicketEscalated:
    address: crm.support.ticket.escalated
    description: |
      Published when a ticket is escalated to a higher tier.
      Consumed by Communication for manager notification.
    messages:
      ticketEscalated:
        $ref: '#/components/messages/TicketEscalated'

  supportTicketResolved:
    address: crm.support.ticket.resolved
    description: |
      Published when a ticket is marked as resolved. Consumed by
      Communication for customer notification.
    messages:
      ticketResolved:
        $ref: '#/components/messages/TicketResolved'

  supportTicketClosed:
    address: crm.support.ticket.closed
    description: |
      Published when a ticket is finalized. Consumed by Communication
      (CSAT survey trigger) and CIAM (customer health scoring).
    messages:
      ticketClosed:
        $ref: '#/components/messages/TicketClosed'

  supportTicketReopened:
    address: crm.support.ticket.reopened
    description: |
      Published when a closed ticket is reopened. Consumed by
      Communication for assignee notification.
    messages:
      ticketReopened:
        $ref: '#/components/messages/TicketReopened'

  supportSlaBreached:
    address: crm.support.sla.breached
    description: |
      Published when system detects an SLA deadline breach.
      Consumed by Communication for escalation alerts.
    messages:
      slaBreached:
        $ref: '#/components/messages/SLABreached'

  supportCsatSubmitted:
    address: crm.support.csat.submitted
    description: |
      Published when a customer submits a satisfaction rating.
      Consumed by CIAM for customer health score updates.
    messages:
      csatSubmitted:
        $ref: '#/components/messages/CSATSubmitted'

  # ═══════════════════════════════════════════════════════════════════════
  # Marketing / Campaigns
  # ═══════════════════════════════════════════════════════════════════════

  marketingCampaignCreated:
    address: crm.marketing.campaign.created
    description: |
      Published when a new campaign is defined. Consumed by Communication
      for delivery infrastructure preparation.
    messages:
      campaignCreated:
        $ref: '#/components/messages/CampaignCreated'

  marketingAudienceDefined:
    address: crm.marketing.segment.defined
    description: |
      Published when a new audience segment is created.
      Primarily for internal Marketing analytics.
    messages:
      audienceDefined:
        $ref: '#/components/messages/AudienceDefined'

  marketingCampaignScheduled:
    address: crm.marketing.campaign.scheduled
    description: |
      Published when a campaign's send date/time is set.
      Consumed by Communication to schedule message delivery.
    messages:
      campaignScheduled:
        $ref: '#/components/messages/CampaignScheduled'

  marketingCampaignLaunched:
    address: crm.marketing.campaign.launched
    description: |
      Published when a campaign is activated and delivery begins.
      Consumed by Communication to start outbound delivery.
    messages:
      campaignLaunched:
        $ref: '#/components/messages/CampaignLaunched'

  marketingCampaignPaused:
    address: crm.marketing.campaign.paused
    description: |
      Published when an active campaign is temporarily halted.
      Consumed by Communication to stop outbound delivery.
    messages:
      campaignPaused:
        $ref: '#/components/messages/CampaignPaused'

  marketingEngagementRecorded:
    address: crm.marketing.engagement.recorded
    description: |
      Published when a customer interaction (open, click, bounce,
      unsubscribe) is logged. Consumed by CIAM for lead scoring.
    messages:
      engagementRecorded:
        $ref: '#/components/messages/EngagementRecorded'

  marketingConversionDeclared:
    address: crm.marketing.conversion.declared
    description: |
      Published when a conversion is attributed to a campaign.
      Consumed by Sales (opportunity attribution) and CIAM (scoring).
    messages:
      conversionDeclared:
        $ref: '#/components/messages/ConversionDeclared'

  marketingAbWinnerSelected:
    address: crm.marketing.ab-test.winner-selected
    description: |
      Published when an A/B test winner is chosen. Consumed by
      Communication to apply the winning variant to remaining audience.
    messages:
      abWinnerSelected:
        $ref: '#/components/messages/ABWinnerSelected'

  marketingCampaignCompleted:
    address: crm.marketing.campaign.completed
    description: |
      Published when a campaign is finalized and metrics are computed.
      Consumed by Communication for final report distribution.
    messages:
      campaignCompleted:
        $ref: '#/components/messages/CampaignCompleted'

  # ═══════════════════════════════════════════════════════════════════════
  # Communication Hub
  # ═══════════════════════════════════════════════════════════════════════

  communicationMessageSent:
    address: crm.communication.message.sent
    description: |
      Published when a message is dispatched to a channel provider.
      Consumed by Support (ticket thread tracking) and Sales
      (interaction logging).
    messages:
      messageSent:
        $ref: '#/components/messages/MessageSent'

  communicationMessageDelivered:
    address: crm.communication.message.delivered
    description: |
      Published when a channel provider confirms delivery.
      Consumed by Support and Sales for interaction tracking.
    messages:
      messageDelivered:
        $ref: '#/components/messages/MessageDelivered'

  communicationMessageFailed:
    address: crm.communication.message.failed
    description: |
      Published when a message delivery fails permanently.
      Consumed by Communication for retry orchestration and alerting.
    messages:
      messageFailed:
        $ref: '#/components/messages/MessageFailed'

  communicationMessageRead:
    address: crm.communication.message.read
    description: |
      Published when a read-receipt is received from the channel.
      Consumed by Marketing (engagement metrics) and Sales.
    messages:
      messageRead:
        $ref: '#/components/messages/MessageRead'

  communicationInboundReceived:
    address: crm.communication.message.inbound-received
    description: |
      Published when an inbound message is processed from a customer.
      Consumed by Support (auto-create ticket) and Sales (log interaction).
    messages:
      inboundReceived:
        $ref: '#/components/messages/InboundReceived'

  communicationOptOutRecorded:
    address: crm.communication.opt-out.recorded
    description: |
      Published when a customer opts out of a channel.
      Consumed by CIAM to update consent records.
    messages:
      optOutRecorded:
        $ref: '#/components/messages/OptOutRecorded'

  # ═══════════════════════════════════════════════════════════════════════
  # Billing & Subscription
  # ═══════════════════════════════════════════════════════════════════════

  billingSubscriptionCreated:
    address: crm.billing.subscription.created
    description: |
      Published when a new subscription is started. Consumed by
      Communication for welcome/onboarding emails.
    messages:
      subscriptionCreated:
        $ref: '#/components/messages/SubscriptionCreated'

  billingSubscriptionPlanChanged:
    address: crm.billing.subscription.plan-changed
    description: |
      Published when a subscription is upgraded or downgraded.
      Consumed by Communication for confirmation notifications.
    messages:
      subscriptionPlanChanged:
        $ref: '#/components/messages/SubscriptionPlanChanged'

  billingSubscriptionCancelled:
    address: crm.billing.subscription.cancelled
    description: |
      Published when a subscription is cancelled. Consumed by
      Communication (confirmation) and CIAM (lifecycle stage update).
    messages:
      subscriptionCancelled:
        $ref: '#/components/messages/SubscriptionCancelled'

  billingInvoiceGenerated:
    address: crm.billing.invoice.generated
    description: |
      Published when an invoice is created for a billing period.
      Consumed by Communication for invoice delivery.
    messages:
      invoiceGenerated:
        $ref: '#/components/messages/InvoiceGenerated'

  billingInvoiceIssued:
    address: crm.billing.invoice.issued
    description: |
      Published when an invoice is finalized and sent to the customer.
      Consumed by Communication for delivery tracking.
    messages:
      invoiceIssued:
        $ref: '#/components/messages/InvoiceIssued'

  billingPaymentSucceeded:
    address: crm.billing.payment.succeeded
    description: |
      Published when a payment is successfully processed. Consumed by
      Communication (receipt) and CIAM (customer health scoring).
    messages:
      paymentSucceeded:
        $ref: '#/components/messages/PaymentSucceeded'

  billingPaymentFailed:
    address: crm.billing.payment.failed
    description: |
      Published when a payment attempt fails. Consumed by
      Communication for dunning notice delivery.
    messages:
      paymentFailed:
        $ref: '#/components/messages/PaymentFailed'

  billingCreditNoteIssued:
    address: crm.billing.credit-note.issued
    description: |
      Published when a credit note is created for a refund or adjustment.
      Consumed by Communication for customer notification.
    messages:
      creditNoteIssued:
        $ref: '#/components/messages/CreditNoteIssued'

  billingTrialStarted:
    address: crm.billing.trial.started
    description: |
      Published when a trial period begins. Consumed by
      Communication for welcome/onboarding flow.
    messages:
      trialStarted:
        $ref: '#/components/messages/TrialStarted'

  billingTrialExpiring:
    address: crm.billing.trial.expiring
    description: |
      Published when a trial period is approaching its end.
      Consumed by Communication for conversion reminder emails.
    messages:
      trialExpiring:
        $ref: '#/components/messages/TrialExpiring'

  billingDunningEscalated:
    address: crm.billing.dunning.escalated
    description: |
      Published on each dunning retry attempt (1-4).
      Consumed by Communication for escalation notice delivery.
    messages:
      dunningEscalated:
        $ref: '#/components/messages/DunningEscalated'

