  # ═══════════════════════════════════════════════════════════════════════
  # Schemas
  # ═══════════════════════════════════════════════════════════════════════
  schemas:
    # ── Shared Value Objects ─────────────────────────────────────────────
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          format: double
          minimum: 0
          example: 1299.99
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code.
          example: "USD"

    # ── Standard Event Envelope Headers ──────────────────────────────────
    EventHeaders:
      type: object
      description: |
        Standard headers present on every domain event message.
        Implementations SHOULD propagate correlationId and causationId
        from the triggering command for distributed tracing.
      required:
        - eventId
        - eventType
        - source
        - timestamp
        - correlationId
        - schemaVersion
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this event instance.
        eventType:
          type: string
          description: |
            Fully qualified event type name, e.g.
            "crm.ciam.customer.registered.v1"
        source:
          type: string
          description: |
            Originating bounded context. One of: ciam, sales, support,
            marketing, communication, billing.
          enum: [ciam, sales, support, marketing, communication, billing]
        timestamp:
          type: string
          format: date-time
          description: When the event was emitted (ISO 8601).
        correlationId:
          type: string
          format: uuid
          description: |
            Traces back to the originating command or external request.
            Propagate across all downstream events.
        causationId:
          type: string
          format: uuid
          nullable: true
          description: |
            The eventId of the event that caused this one. Null for
            root events triggered by commands.
        schemaVersion:
          type: string
          pattern: '^\d+\.\d+$'
          description: Schema version for this event type (e.g., "1.0").
        idempotencyKey:
          type: string
          format: uuid
          nullable: true
          description: |
            Idempotency key from the originating command. Consumers use
            this to deduplicate processing.

    # ── CIAM Event Payloads ──────────────────────────────────────────────
    CustomerRegisteredPayload:
      type: object
      required: [customerId, contactId, lifecycleStage, source, registeredAt]
      properties:
        customerId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        lifecycleStage:
          type: string
          enum: [lead]
        source:
          type: string
          description: Origin of registration (e.g., website, import, referral).
        registeredAt:
          type: string
          format: date-time

    LeadQualifiedPayload:
      type: object
      required: [customerId, contactId, previousStage, score, qualifiedAt]
      properties:
        customerId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        previousStage:
          type: string
          enum: [lead]
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: The score at time of qualification.
        qualifiedAt:
          type: string
          format: date-time

    CustomersMergedPayload:
      type: object
      required: [survivingContactId, mergedContactId, mergedAt]
      properties:
        survivingContactId:
          type: string
          format: uuid
          description: The contact that remains active.
        mergedContactId:
          type: string
          format: uuid
          description: The contact that was deactivated and merged.
        mergedAt:
          type: string
          format: date-time

    ConsentChangedPayload:
      type: object
      required: [customerId, contactId, purpose, granted, changedAt]
      properties:
        customerId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        purpose:
          type: string
          description: Data-processing purpose (e.g., email_marketing, analytics).
        granted:
          type: boolean
        changedAt:
          type: string
          format: date-time

    EmailVerifiedPayload:
      type: object
      required: [customerId, contactId, verifiedAt]
      properties:
        customerId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        verifiedAt:
          type: string
          format: date-time

    CustomerDeactivatedPayload:
      type: object
      required: [customerId, contactId, deactivatedAt]
      properties:
        customerId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        deactivatedAt:
          type: string
          format: date-time

    LifecycleStageChangedPayload:
      type: object
      required: [customerId, contactId, previousStage, newStage, changedAt]
      properties:
        customerId:
          type: string
          format: uuid
        contactId:
          type: string
          format: uuid
        previousStage:
          type: string
          enum: [lead, qualified, opportunity, customer, advocate, churned]
        newStage:
          type: string
          enum: [lead, qualified, opportunity, customer, advocate, churned]
        changedAt:
          type: string
          format: date-time

    # ── Sales Event Payloads ─────────────────────────────────────────────
    OpportunityCreatedPayload:
      type: object
      required: [opportunityId, customerId, accountId, name, amount, createdAt]
      properties:
        opportunityId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        name:
          type: string
        amount:
          $ref: '#/components/schemas/Money'
        createdAt:
          type: string
          format: date-time

    OpportunityStageAdvancedPayload:
      type: object
      required: [opportunityId, previousStage, newStage, advancedAt]
      properties:
        opportunityId:
          type: string
          format: uuid
        previousStage:
          type: string
        newStage:
          type: string
        advancedAt:
          type: string
          format: date-time

    OpportunityClosedPayload:
      type: object
      required: [opportunityId, outcome, closedAt]
      properties:
        opportunityId:
          type: string
          format: uuid
        outcome:
          type: string
          enum: [won, lost]
        winLossReasonCategory:
          type: string
          enum: [price, features, timing, competitor, lost_contact, no_decision, other]
          nullable: true
        closedAt:
          type: string
          format: date-time

    QuoteGeneratedPayload:
      type: object
      required: [quoteId, opportunityId, totalAmount, generatedAt]
      properties:
        quoteId:
          type: string
          format: uuid
        opportunityId:
          type: string
          format: uuid
        totalAmount:
          $ref: '#/components/schemas/Money'
        generatedAt:
          type: string
          format: date-time

    QuoteSentPayload:
      type: object
      required: [quoteId, opportunityId, sentAt]
      properties:
        quoteId:
          type: string
          format: uuid
        opportunityId:
          type: string
          format: uuid
        sentAt:
          type: string
          format: date-time

    QuoteAcceptedPayload:
      type: object
      required: [quoteId, opportunityId, customerId, acceptedAt]
      properties:
        quoteId:
          type: string
          format: uuid
        opportunityId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        acceptedAt:
          type: string
          format: date-time

    ForecastUpdatedPayload:
      type: object
      required: [totalWeightedRevenue, totalUnweightedRevenue, updatedAt]
      properties:
        totalWeightedRevenue:
          $ref: '#/components/schemas/Money'
        totalUnweightedRevenue:
          $ref: '#/components/schemas/Money'
        updatedAt:
          type: string
          format: date-time

    OwnerReassignedPayload:
      type: object
      required: [opportunityId, previousOwnerId, newOwnerId, reassignedAt]
      properties:
        opportunityId:
          type: string
