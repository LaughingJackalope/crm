# ── Test profile for billing-service integration tests ──────────────────────────
# Activated automatically by @QuarkusTest.
# The CrmIntegrationTestResourceLifecycleManager overrides datasource and Kafka
# config with Testcontainer-provided values at runtime.

# ── Database ──────────────────────────────────────────────────────────────────
# These are overridden by the lifecycle manager at runtime.
# Set sane defaults for local dev without Testcontainers.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/crm_billing
quarkus.datasource.username=${DB_USERNAME:crm}
quarkus.datasource.password=${DB_PASSWORD:crm}
quarkus.hibernate-orm.database.generation=create

# ── Kafka ──────────────────────────────────────────────────────────────────────
# Dev Services disabled — lifecycle manager provides Kafka container.
quarkus.kafka.devservices.enabled=false
kafka.bootstrap.servers=localhost:9092

# ── Observability (disabled in tests) ─────────────────────────────────────────
quarkus.otel.traces.enabled=false
quarkus.log.console.level=WARN


# ── Quarkus CDI indexing for shared test library ──────────────────────────
quarkus.index-dependency.common-test.group-id=crm
quarkus.index-dependency.common-test.artifact-id=libs-common-test
