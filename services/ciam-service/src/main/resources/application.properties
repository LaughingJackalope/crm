# ── CIAM Service ──────────────────────────────────────────────────────────────
quarkus.application.name=ciam-service
quarkus.http.port=8081

# ── Database ──────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5433/crm}
quarkus.datasource.username=${DB_USERNAME:crm}
quarkus.datasource.password=${DB_PASSWORD:crm}
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1.0.0

# ── Kafka ─────────────────────────────────────────────────────────────────────
mp.messaging.outgoing.customer-events.connector=smallrye-kafka
mp.messaging.outgoing.customer-events.topic=crm.ciam.events
mp.messaging.outgoing.customer-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.outgoing.domain-events.connector=smallrye-kafka
mp.messaging.outgoing.domain-events.topic=crm.domain-events
mp.messaging.outgoing.domain-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# ── Transactional Outbox ─────────────────────────────────────────────────
outbox.relay.interval=500ms
outbox.relay.retry-interval=30s

# ── Micrometer for outbox monitoring ─────────────────────────────────────
quarkus.micrometer.binder.outbox.enabled=true

# ── OIDC / IAM ────────────────────────────────────────────────────────────────
quarkus.oidc.enabled=${OIDC_ENABLED:true}
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://localhost:9090/realms/crm}
quarkus.oidc.client-id=ciam-service
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:}

# ── Observability ─────────────────────────────────────────────────────────────
quarkus.opentelemetry.enabled=true
quarkus.opentelemetry.tracer.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.opentelemetry.tracer.sampler=always_on
quarkus.opentelemetry.tracer.sampler.ratio=1.0

# Console log format with trace correlation
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, spanId=%X{spanId}, traceFlags=%X{traceFlags} [%c{2.}] (%t) %s%e%n

# Micrometer metrics
quarkus.micrometer.export.prometheus.path=/metrics

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/health

# ── Dev profile: disable OIDC for local Docker/Kind development ───────────────
%dev.quarkus.oidc.enabled=false
%dev.quarkus.http.auth.proactive=false

# ── K8s profile: disable OIDC, use env vars for service discovery ─────────────
%k8s.quarkus.oidc.enabled=false
%k8s.quarkus.http.auth.proactive=false
