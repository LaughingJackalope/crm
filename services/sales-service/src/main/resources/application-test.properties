# ── Test profile ─────────────────────────────────────────────────────────────
# Used by @QuarkusTest with Testcontainers

# ── Database (Testcontainers) ────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
# URL, username, password set dynamically by Testcontainers via
# quarkus.datasource.jdbc.url, etc. in the test

# ── Kafka (Testcontainers) ───────────────────────────────────────────────────
mp.messaging.incoming.customer-events.connector=smallrye-kafka
mp.messaging.incoming.customer-events.topic=crm.ciam.events
mp.messaging.incoming.customer-events.value.deserializer=io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
mp.messaging.incoming.customer-events.group.id=sales-service-test

# ── Disable schema generation for tests ──────────────────────────────────────
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=no-file

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.crm.sales".level=DEBUG
quarkus.log.category."org.testcontainers".level=INFO
