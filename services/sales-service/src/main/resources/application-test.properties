# ── Test profile ─────────────────────────────────────────────────────────────
# Used by @QuarkusTest with Testcontainers

# ── Database (Testcontainers) ────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
# URL, username, password set dynamically by Testcontainers via
# quarkus.datasource.jdbc.url, etc. in the test

# ── Kafka (Testcontainers) ───────────────────────────────────────────────────
mp.messaging.incoming.customer-events.connector=smallrye-kafka
mp.messaging.incoming.customer-events.topic=crm.ciam.events
mp.messaging.incoming.customer-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.customer-events.group.id=sales-service-test

# ── Dead Letter Queue (mirrors production) ──────────────────────────────────
mp.messaging.incoming.customer-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.customer-events.dead-letter-queue.topic=crm.ciam.events.dlq
mp.messaging.incoming.customer-events.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.customer-events.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.customer-events.dead-letter-queue.max-retries=3
mp.messaging.incoming.customer-events.dead-letter-queue.delay=1s
# ── Disable schema generation for tests ──────────────────────────────────────
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=no-file

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.crm.sales".level=DEBUG
quarkus.log.category."org.testcontainers".level=INFO
