quarkus.application.name=sales-service
quarkus.http.port=8082

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/crm_sales
quarkus.datasource.username=${DB_USERNAME:crm}
quarkus.datasource.password=${DB_PASSWORD:crm}
quarkus.hibernate-orm.database.generation=validate

mp.messaging.outgoing.sales-events.connector=smallrye-kafka
mp.messaging.outgoing.sales-events.topic=crm.sales.events
mp.messaging.outgoing.sales-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.outgoing.domain-events.connector=smallrye-kafka
mp.messaging.outgoing.domain-events.topic=crm.domain-events
mp.messaging.outgoing.domain-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.incoming.customer-events.connector=smallrye-kafka
mp.messaging.incoming.customer-events.topic=crm.ciam.events
mp.messaging.incoming.customer-events.value.deserializer=io.quarkus.kafka.client.serialization.ObjectMapperDeserializer

quarkus.micrometer.export.prometheus.path=/metrics
quarkus.opentelemetry.enabled=true
quarkus.opentelemetry.tracer.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
