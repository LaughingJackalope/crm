quarkus.application.name=marketing-service
quarkus.http.port=8085

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/crm_marketing}
quarkus.datasource.username=${DB_USERNAME:crm}
quarkus.datasource.password=${DB_PASSWORD:crm}
quarkus.hibernate-orm.database.generation=none

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1.0.0

mp.messaging.outgoing.marketing-events.connector=smallrye-kafka
mp.messaging.outgoing.marketing-events.topic=crm.marketing.events
mp.messaging.outgoing.marketing-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.outgoing.domain-events.connector=smallrye-kafka
mp.messaging.outgoing.domain-events.topic=crm.domain-events
mp.messaging.outgoing.domain-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

mp.messaging.incoming.sales-opportunity-events.connector=smallrye-kafka
mp.messaging.incoming.sales-opportunity-events.topic=crm.sales.opportunity.closed
mp.messaging.incoming.sales-opportunity-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.messaging.incoming.sales-opportunity-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.sales-opportunity-events.dead-letter-queue.topic=crm.sales.opportunity.closed.dlq
mp.messaging.incoming.sales-opportunity-events.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.sales-opportunity-events.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.sales-opportunity-events.dead-letter-queue.max-retries=3
mp.messaging.incoming.sales-opportunity-events.dead-letter-queue.delay=2s

outbox.relay.interval=500ms
outbox.relay.retry-interval=30s

quarkus.opentelemetry.enabled=true
quarkus.opentelemetry.tracer.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.opentelemetry.tracer.sampler=always_on
quarkus.opentelemetry.tracer.ratio=1.0
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, spanId=%X{spanId}, traceFlags=%X{traceFlags} [%c{2.}] (%t) %s%e%n
quarkus.micrometer.export.prometheus.path=/metrics

%k8s.quarkus.oidc.enabled=false
%k8s.quarkus.http.auth.proactive=false
