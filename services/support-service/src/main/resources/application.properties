quarkus.application.name=support-service
quarkus.http.port=8083

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/crm_support}
quarkus.datasource.username=${DB_USERNAME:crm}
quarkus.datasource.password=${DB_PASSWORD:crm}
quarkus.hibernate-orm.database.generation=validate

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1.0.0
# ── Outgoing: support events ────────────────────────────────────────────────
mp.messaging.outgoing.support-events.connector=smallrye-kafka
mp.messaging.outgoing.support-events.topic=crm.support.events
mp.messaging.outgoing.support-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# ── Outgoing: domain events (outbox relay) ─────────────────────────────────
mp.messaging.outgoing.domain-events.connector=smallrye-kafka
mp.messaging.outgoing.domain-events.topic=crm.domain-events
mp.messaging.outgoing.domain-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# ── Incoming: CIAM lifecycle events ────────────────────────────────────────
mp.messaging.incoming.ciam-lifecycle-events.connector=smallrye-kafka
mp.messaging.incoming.ciam-lifecycle-events.topic=crm.ciam.lifecycle-stage.changed
mp.messaging.incoming.ciam-lifecycle-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ── Dead Letter Queue ──────────────────────────────────────────────────────
mp.messaging.incoming.ciam-lifecycle-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.topic=crm.ciam.lifecycle-stage.changed.dlq
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.max-retries=3
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.delay=2s

# ── Transactional Outbox Relay ─────────────────────────────────────────────
outbox.relay.interval=500ms
outbox.relay.retry-interval=30s

# ── Observability ──────────────────────────────────────────────────────────
# OpenTelemetry distributed tracing — unified configuration
quarkus.opentelemetry.enabled=true
quarkus.opentelemetry.tracer.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.opentelemetry.tracer.sampler=always_on
quarkus.opentelemetry.tracer.ratio=1.0

# Console log format with trace correlation
quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, spanId=%X{spanId}, traceFlags=%X{traceFlags} [%c{2.}] (%t) %s%e%n

# Micrometer metrics
quarkus.micrometer.export.prometheus.path=/metrics

# ── Kubernetes profile ─────────────────────────────────────────────────────
%k8s.quarkus.oidc.enabled=false
%k8s.quarkus.http.auth.proactive=false
