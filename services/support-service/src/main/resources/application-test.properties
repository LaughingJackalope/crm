# ── Test profile ─────────────────────────────────────────────────────────────

# ── Database (Testcontainers) ────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql

# ── Kafka (Testcontainers) ───────────────────────────────────────────────────
mp.messaging.incoming.ciam-lifecycle-events.connector=smallrye-kafka
mp.messaging.incoming.ciam-lifecycle-events.topic=crm.ciam.lifecycle-stage.changed
mp.messaging.incoming.ciam-lifecycle-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.ciam-lifecycle-events.group.id=support-service-test

# ── Dead Letter Queue (mirrors production) ──────────────────────────────────
mp.messaging.incoming.ciam-lifecycle-events.failure-strategy=dead-letter-queue
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.topic=crm.ciam.lifecycle-stage.changed.dlq
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.max-retries=3
mp.messaging.incoming.ciam-lifecycle-events.dead-letter-queue.delay=1s

# ── Schema generation for tests ─────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=no-file

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."com.crm.support".level=DEBUG
