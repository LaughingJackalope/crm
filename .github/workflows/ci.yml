# ═══════════════════════════════════════════════════════════════════════════════
# CRM Monorepo — CI Pipeline with Manual Release & Snapshot Support
# ═══════════════════════════════════════════════════════════════════════════════
#
# Architecture Overview:
#
#   ┌──────────────┐     ┌──────────────────┐     ┌─────────────────┐
#   │ Path Filter / │────▶│ Dynamic Matrix   │────▶│   Unit Tests    │
#   │ Dispatch Bypass│    │ (affected svcs)  │     │  (fast, no Docker)│
#   └──────────────┘     └──────────────────┘     └────────┬────────┘
#                                                          │
#   ┌──────────────┐     ┌──────────────────┐     ┌───────▼────────┐
#   │ Version      │────▶│ Gradle -Pversion  │────▶│ Integration    │
#   │ Resolution   │     │                   │     │ Tests (Docker) │
#   └──────────────┘     └──────────────────┘     └───────┬────────┘
#                                                          │
#                                                 ┌───────▼────────┐
#                                                 │ Artifact Upload│
#                                                 │ (14-day TTL)   │
#                                                 └────────────────┘
#
# Test Strategy:
#   Unit tests (@Tag("integration") excluded): Fast feedback, no Docker.
#   Integration tests (@Tag("integration") only): Testcontainers for Postgres+Kafka.
#   Both phases must pass before artifacts are uploaded.
#
# Trigger Modes:
#   1. push/PR (automatic): dorny/paths-filter detects changed services.
#      Version defaults to 0.1.0-SNAPSHOT-{run_number}.
#   2. workflow_dispatch (manual): bypasses path-filtering, builds ALL 6
#      services. If release_version input is provided (e.g., "1.0.0"), that
#      string is used as the SemVer. Otherwise falls back to snapshot format.
#
# Version Resolution:
#   - Manual dispatch WITH release_version → use that exact string (e.g., 1.0.0)
#   - All other triggers → 0.1.0-SNAPSHOT-{github.run_number}
#   - Gradle receives it via -Pversion=... which convention plugins resolve:
#       version = findProperty("version")?.toString() ?: "0.0.1-SNAPSHOT"
#
# Artifact Naming Convention:
#   <service>-<version>.jar  (e.g., billing-service-1.0.0.jar or
#                              billing-service-0.1.0-SNAPSHOT-42.jar)
#   Quarkus runner JARs are renamed from the Gradle-built
#   <artifact>-<version>-runner.jar to the clean <artifact>-<version>.jar.
#
# Cache Hygiene:
#   - Non-main branches: READ-ONLY cache (never push).
#   - Main branch: read + push (establishes authoritative cache).
#   - This prevents feature-branch cache pollution.
#
# ═══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # ── Manual Release Trigger ─────────────────────────────────────────────────
  # Run from the GitHub Actions UI → "Run workflow".
  # Provide a SemVer string (e.g., "1.0.0") for a production release snapshot,
  # or leave blank to build a timestamped development snapshot of all services.
  workflow_dispatch:
    inputs:
      release_version:
        description: "Enter SemVer for production release (e.g., 1.0.0). Leave blank to build as a standard timestamped snapshot."
        required: false
        type: string
        default: ""

# ── Concurrency control ──────────────────────────────────────────────────────
# Cancel in-progress runs for the same PR/branch to avoid redundant builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Global permissions ──────────────────────────────────────────────────────
# Principle of least privilege — jobs add granular permissions as needed.
permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: detect-changes
  # ═══════════════════════════════════════════════════════════════════════════
  # Determines which services are affected and computes the build version.
  #
  # Outputs:
  #   affected-services  — JSON array of service names (e.g., ["billing-service"]).
  #                         All 6 services on workflow_dispatch.
  #   any-changed        — "true" if any service needs building, "false" otherwise.
  #   build-version      — The resolved version string for Gradle -Pversion.
  #
  # Logic:
  #   - If triggered via workflow_dispatch → all 6 services, version from input
  #     or computed snapshot.
  #   - If push/PR → run dorny/paths-filter, check global + per-service paths.
  #   - Non-service-only changes (docs, infra) → empty array, skipped build.
  # ═══════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      affected-services: ${{ steps.compute.outputs.services }}
      any-changed: ${{ steps.compute.outputs.any_changed }}
      build-version: ${{ steps.version.outputs.build_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so paths-filter can diff against the merge base.
          # Not needed for workflow_dispatch (all services always build),
          # but checkout itself is required for subsequent Gradle steps.
          fetch-depth: 0

      # ── Path Filter (skipped on workflow_dispatch) ────────────────────────
      # dorny/paths-filter only makes sense for push/PR triggers. On manual
      # dispatch we force all 6 services regardless of diff.
      - name: Compute changed paths
        uses: dorny/paths-filter@v3
        id: filter
        # Only run path filtering for push/PR. Dispatch bypasses this entirely.
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            # ── Shared / global paths ──────────────────────────────────────
            # A change here flags ALL services for rebuild.
            global:
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle.properties'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - 'gradle/libs.versions.toml'

            # ── Per-service paths ──────────────────────────────────────────
            # Each entry includes the service directory plus shared paths
            # so a shared-lib change also triggers individual services.
            ciam-service:
              - 'services/ciam-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            sales-service:
              - 'services/sales-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            support-service:
              - 'services/support-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            billing-service:
              - 'services/billing-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            marketing-service:
              - 'services/marketing-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            communication-service:
              - 'services/communication-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

      - name: Compute affected services matrix
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          # ── Determine the set of affected services ──────────────────────
          SERVICES=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch: always build the full ecosystem.
            echo "::notice::Manual dispatch — building all 6 services."
            SERVICES=(
              "ciam-service"
              "sales-service"
              "support-service"
              "billing-service"
              "marketing-service"
              "communication-service"
            )
          elif [[ "${{ steps.filter.outputs.global }}" == "true" ]]; then
            # Global/shared paths changed — all services are affected.
            echo "::notice::Global/shared paths changed — all services will build."
            SERVICES=(
              "ciam-service"
              "sales-service"
              "support-service"
              "billing-service"
              "marketing-service"
              "communication-service"
            )
          else
            # Check each service individually — hardcoded because GitHub
            # Actions expressions cannot use dynamic bracket keys.
            if [[ "${{ steps.filter.outputs['ciam-service'] }}" == "true" ]]; then
              SERVICES+=("ciam-service")
            fi
            if [[ "${{ steps.filter.outputs['sales-service'] }}" == "true" ]]; then
              SERVICES+=("sales-service")
            fi
            if [[ "${{ steps.filter.outputs['support-service'] }}" == "true" ]]; then
              SERVICES+=("support-service")
            fi
            if [[ "${{ steps.filter.outputs['billing-service'] }}" == "true" ]]; then
              SERVICES+=("billing-service")
            fi
            if [[ "${{ steps.filter.outputs['marketing-service'] }}" == "true" ]]; then
              SERVICES+=("marketing-service")
            fi
            if [[ "${{ steps.filter.outputs['communication-service'] }}" == "true" ]]; then
              SERVICES+=("communication-service")
            fi
          fi

          # ── Emit outputs ────────────────────────────────────────────────
          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "No services affected — pipeline will skip build."
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -s . | tr -d '\n')
            echo "Affected services: ${JSON}"
            echo "services=${JSON}" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Version Resolution ────────────────────────────────────────────────
      # Priority:
      #   1. Manual dispatch WITH release_version input → use as-is (SemVer).
      #   2. Everything else → 0.1.0-SNAPSHOT-{run_number}.
      #
      # The convention plugins in buildSrc resolve this via:
      #   version = findProperty("version")?.toString() ?: "0.0.1-SNAPSHOT"
      # so passing -Pversion=<value> on the Gradle CLI overrides the default.
      - name: Resolve build version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # ── Version Tag Detection ───────────────────────────────────────
          # If triggered by a tag push matching v* (e.g. v0.0.1), strip the
          # 'v' prefix and use the bare SemVer as the build version.
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${{ github.ref_name }}"
            # Strip leading 'v'
            VER="${VER#v}"
            echo "::notice::Release tag detected: ${{ github.ref_name }} → version ${VER}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]] \
             && [[ -n "${{ github.event.inputs.release_version }}" ]]; then
            # Explicit SemVer from manual dispatch input.
            VER="${{ github.event.inputs.release_version }}"
            echo "::notice::Manual release version: ${VER}"
          else
            # Development snapshot: monotonically increasing run number
            # ensures each CI build gets a unique, sortable version.
            VER="0.1.0-SNAPSHOT-${{ github.run_number }}"
          fi

          # Validate: reject strings with characters that break JAR filenames.
          if [[ "${VER}" =~ [^a-zA-Z0-9._-] ]]; then
            echo "::error::Invalid version string: '${VER}'"
            echo "Only alphanumeric, '.', '-', and '_' are allowed."
            exit 1
          fi

          echo "Build version: ${VER}"
          echo "build_version=${VER}" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: unit-test
  # ═══════════════════════════════════════════════════════════════════════════
  # Fast feedback: compiles and runs unit tests only.
  # Integration tests (@Tag("integration")) are excluded — no Docker needed.
  #
  # This catches compilation errors, unit test failures, and regressions
  # in seconds rather than waiting for Testcontainers to start.
  # ═══════════════════════════════════════════════════════════════════════════
  unit-test:
    name: Unit Test (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.any-changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs['affected-services']) }}
      max-parallel: 6
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          dependency-graph: generate-and-upload

      # ── Compile & Unit Test ────────────────────────────────────────────────
      # Runs `./gradlew :services:<name>:test` which excludes @Tag("integration")
      # tests by default (configured in crm.quarkus-convention).
      # No Docker daemon required — these are pure JVM tests.
      - name: Compile & Unit Test — ${{ matrix.service }}
        run: |
          ./gradlew :services:${{ matrix.service }}:test \
            -Pversion=${{ needs.detect-changes.outputs.build-version }} \
            --no-daemon \
            --build-cache \
            --configuration-cache \
            --parallel

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: integration-test
  # ═══════════════════════════════════════════════════════════════════════════
  # Runs @Tag("integration") tests with Testcontainers (Postgres + Kafka).
  # Depends on unit-test passing — no point spinning up Docker if unit tests fail.
  #
  # GitHub Actions ubuntu-latest runners have Docker available, so
  # Testcontainers can start containers directly.
  # ═══════════════════════════════════════════════════════════════════════════
  integration-test:
    name: Integration Test (${{ matrix.service }})
    needs: [detect-changes, unit-test]
    if: needs.detect-changes.outputs.any-changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs['affected-services']) }}
      max-parallel: 6
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          dependency-graph: generate-and-upload

      # ── Integration Test ──────────────────────────────────────────────────
      # Runs only @Tag("integration") tests via -Pinclude.integration.
      # Testcontainers starts Postgres 17-alpine + Confluent Kafka 7.7.1.
      - name: Integration Test — ${{ matrix.service }}
        run: |
          ./gradlew :services:${{ matrix.service }}:test \
            -Pversion=${{ needs.detect-changes.outputs.build-version }} \
            -Pinclude.integration \
            --no-daemon \
            --build-cache \
            --parallel

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: package
  # ═══════════════════════════════════════════════════════════════════════════
  # Stages versioned runner JARs after both test phases pass.
  # Depends on unit-test AND integration-test.
  # ═══════════════════════════════════════════════════════════════════════════
  package:
    name: Package (${{ matrix.service }})
    needs: [detect-changes, unit-test, integration-test]
    if: needs.detect-changes.outputs.any-changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs['affected-services']) }}
      max-parallel: 6
      fail-fast: false

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # ── Build Runner JAR ──────────────────────────────────────────────────
      # quarkusBuild produces the runner JAR for the service.
      # -Pversion sets the JAR filename: <service>-<version>-runner.jar.
      - name: Build runner JAR — ${{ matrix.service }}
        run: |
          ./gradlew :services:${{ matrix.service }}:quarkusBuild \
            -Pversion=${{ needs.detect-changes.outputs.build-version }} \
            --no-daemon \
            --build-cache \
            --parallel

      # ── Stage Versioned Runner JAR ────────────────────────────────────────
      # Two JAR naming patterns exist across services:
      #   1. Services with @QuarkusTest: <service>-<version>-runner.jar
      #      (produced by quarkusBuild, triggered by integration tests)
      #   2. Services with unit tests only: <service>-<version>.jar
      #      (produced by the standard build task)
      # We normalize both to: <service>-<version>.jar
      - name: Stage runner JAR — ${{ matrix.service }}
        id: stage
        shell: bash
        run: |
          set -euo pipefail

          SERVICE="${{ matrix.service }}"
          VERSION="${{ needs.detect-changes.outputs.build-version }}"
          BUILD_LIBS="services/${SERVICE}/build/libs"

          # ── Locate the Quarkus runner JAR ───────────────────────────────
          # Try the runner JAR first, then fall back to the plain JAR.
          RUNNER_JAR=$(find "${BUILD_LIBS}" -maxdepth 1 -name '*-runner.jar' -type f | head -1)

          if [[ -z "${RUNNER_JAR}" ]]; then
            RUNNER_JAR=$(find "${BUILD_LIBS}" -maxdepth 1 -name "${SERVICE}-${VERSION}.jar" -type f | head -1)
          fi

          if [[ -z "${RUNNER_JAR}" ]]; then
            echo "::error::No runner JAR found in ${BUILD_LIBS}/"
            echo "Contents of build/libs:"
            ls -la "${BUILD_LIBS}/" 2>/dev/null || echo "(directory empty or missing)"
            exit 1
          fi

          echo "Found runner JAR: ${RUNNER_JAR}"

          # ── Normalize artifact name ─────────────────────────────────────
          STAGED_NAME="${SERVICE}-${VERSION}.jar"
          STAGED_DIR="staged-artifacts"
          STAGED_PATH="${STAGED_DIR}/${STAGED_NAME}"

          mkdir -p "${STAGED_DIR}"
          cp "${RUNNER_JAR}" "${STAGED_PATH}"

          echo "Staged: ${STAGED_PATH}"
          ls -lh "${STAGED_PATH}"

          echo "staged_path=${STAGED_PATH}" >> "$GITHUB_OUTPUT"

      # ── Upload Versioned Artifact ─────────────────────────────────────────
      - name: Upload runner JAR artifact — ${{ matrix.service }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-${{ needs.detect-changes.outputs.build-version }}
          path: staged-artifacts/${{ matrix.service }}-${{ needs.detect-changes.outputs.build-version }}.jar
          retention-days: 14
          if-no-files-found: error
          overwrite: true

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: container-image
  # ═══════════════════════════════════════════════════════════════════════════
  # Builds and pushes OCI container images for each affected service using
  # Quarkus Jib (no Docker daemon required). Images are pushed to GitHub
  # Container Registry (GHCR).
  # ═══════════════════════════════════════════════════════════════════════════
  container-image:
    name: Container Image (${{ matrix.service }})
    needs: [detect-changes, package]
    if: needs.detect-changes.outputs.any-changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs['affected-services']) }}
      max-parallel: 6
      fail-fast: false

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build & push container image — ${{ matrix.service }}
        env:
          QUARKUS_CONTAINER_IMAGE_REGISTRY: ghcr.io
          QUARKUS_CONTAINER_IMAGE_ORGANIZATION: ${{ github.repository_owner }}
          QUARKUS_CONTAINER_IMAGE_NAME: ${{ matrix.service }}
          QUARKUS_CONTAINER_IMAGE_TAG: ${{ needs.detect-changes.outputs.build-version }}
          QUARKUS_CONTAINER_IMAGE_ADDITIONAL_TAGS: ${{ github.ref == 'refs/heads/main' && 'latest' || '' }}
          QUARKUS_CONTAINER_IMAGE_PUSH: true
          QUARKUS_CONTAINER_IMAGE_USERNAME: ${{ github.actor }}
          QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SERVICE="${{ matrix.service }}"
          VERSION="${{ needs.detect-changes.outputs.build-version }}"

          # Run quarkusBuild + Jib in one step. Gradle reuses the compilation
          # cache from the package job, so this is near-instant.
          # Jib builds from the quarkus-app directory that quarkusBuild assembles.
          ./gradlew :services:${SERVICE}:quarkusBuild \
            -Pversion="${VERSION}" \
            -Dquarkus.container-image.build=true \
            -Dquarkus.container-image.push=true \
            -DskipTests \
            --no-daemon \
            --build-cache

      - name: Verify image — ${{ matrix.service }}
        run: |
          echo "✅ Image pushed: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ needs.detect-changes.outputs.build-version }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "✅ Also tagged: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest"
          fi
