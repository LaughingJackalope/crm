# ═══════════════════════════════════════════════════════════════════════════════
# CRM Monorepo — Continuous Integration Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
# Architecture Overview:
#
#   ┌─────────────┐     ┌──────────────────┐     ┌─────────────────┐
#   │  Path Filter │────▶│ Dynamic Matrix   │────▶│  Build & Test   │
#   │  (changes)   │     │ (affected svcs)  │     │  (per service)  │
#   └─────────────┘     └──────────────────┘     └────────┬────────┘
#                                                          │
#                        ┌──────────────────┐     ┌───────▼────────┐
#                        │  Artifact Upload │◀────│  Stage Runner  │
#                        │  (14-day TTL)    │     │  JARs          │
#                        └──────────────────┘     └────────────────┘
#
# Change-Detection Strategy:
#   1. dorny/paths-filter inspects diffs against the PR target (or main).
#   2. Each service directory (services/<name>/) is an independent filter.
#   3. Shared paths (libs/, gradle/, buildSrc/, wrapper, .github/) trigger
#      ALL services — a change to common code is a change to everyone.
#   4. Non-service paths (DDD/, *.md, infra/) are ignored — pipeline exits.
#
# Matrix Evaluation:
#   The `detect` job produces a JSON array of affected service names.
#   The `build` job uses `fromJson()` to expand this into a parallel matrix.
#   If the array is empty (`[]`), the matrix has zero dimensions and the build
#   job is skipped entirely — no runners are provisioned.
#
# Cache Hygiene:
#   - gradle/actions/setup-gradle handles wrapper + dependency caching.
#   - Non-main branches are READ-ONLY (never push to the cache).
#   - Main branch pushes, establishing the authoritative cache layer.
#   - This prevents feature-branch cache pollution and ensures reproducibility.
#
# ═══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ── Concurrency control ──────────────────────────────────────────────────────
# Cancel in-progress runs for the same PR/branch to avoid redundant builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Global permissions ──────────────────────────────────────────────────────
# Principle of least privilege — jobs add granular permissions as needed.
permissions:
  contents: read

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: detect-changes
  # ═══════════════════════════════════════════════════════════════════════════
  # Determines which services are affected by the current diff.
  #
  # Outputs:
  #   affected-services — JSON array of service names, e.g. ["billing-service",
  #                       "communication-service"]. Empty [] if none changed.
  #
  # Logic:
  #   For each service, the filter matches if:
  #     (a) Files under services/<name>/** changed, OR
  #     (b) Any shared/global path changed (libs/, gradle/, buildSrc/, etc.)
  #
  #   A global change sets `global_changed=true`, which forces every service
  #   into the matrix. This is the conservative/correct choice — a change to
  #   :libs:common could break any downstream consumer.
  # ═══════════════════════════════════════════════════════════════════════════
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      affected-services: ${{ steps.compute.outputs.services }}
      any-changed: ${{ steps.compute.outputs.any_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so paths-filter can diff against the merge base.
          fetch-depth: 0

      - name: Compute changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # ── Shared / global paths ──────────────────────────────────────
            # A change here flags ALL services for rebuild.
            global:
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle.properties'
              - 'settings.gradle.kts'
              - 'build.gradle.kts'
              - 'gradle/libs.versions.toml'

            # ── Per-service paths ──────────────────────────────────────────
            ciam-service:
              - 'services/ciam-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            sales-service:
              - 'services/sales-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            support-service:
              - 'services/support-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            billing-service:
              - 'services/billing-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            marketing-service:
              - 'services/marketing-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

            communication-service:
              - 'services/communication-service/**'
              - 'libs/**'
              - 'buildSrc/**'
              - 'gradle/**'

      - name: Compute affected services matrix
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          # ── Determine the set of affected services ──────────────────────
          SERVICES=()

          # If global paths changed, every service is affected.
          if [[ "${{ steps.filter.outputs.global }}" == "true" ]]; then
            echo "::notice::Global/shared paths changed — all services will build."
            SERVICES=(
              "ciam-service"
              "sales-service"
              "support-service"
              "billing-service"
              "marketing-service"
              "communication-service"
            )
          else
            # Otherwise, check each service individually.
            for svc in ciam-service sales-service support-service billing-service marketing-service communication-service; do
              # The per-service filter already includes libs/ and buildSrc/,
              # so a shared-lib change also triggers individual services.
              # This is a belt-and-suspenders check on top of the global flag.
              if [[ "${{ steps.filter.outputs[svc] }}" == "true" ]]; then
                SERVICES+=("$svc")
              fi
            done
          fi

          # ── Emit outputs ────────────────────────────────────────────────
          if [[ ${#SERVICES[@]} -eq 0 ]]; then
            echo "No services affected — pipeline will skip build."
            echo "services=[]" >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            # Build a compact JSON array: ["svc1","svc2",...]
            JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -R . | jq -s . | tr -d '\n')
            echo "Affected services: ${JSON}"
            echo "services=${JSON}" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB: build
  # ═══════════════════════════════════════════════════════════════════════════
  # Dynamically expands the affected-services array into a parallel matrix.
  # Each matrix cell compiles, tests, stages, and uploads one service.
  #
  # If affected-services is `[]`, the matrix is zero-dimensional and this job
  # is skipped — GitHub does not provision any runners.
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.service }})
    needs: detect-changes
    # Skip entirely if no services changed (e.g., docs-only PR).
    if: needs.detect-changes.outputs.any-changed == 'true'
    runs-on: ubuntu-latest

    strategy:
      # ── Dynamic matrix from detect-changes output ──────────────────────
      # fromJson parses the JSON array into parallel job dimensions.
      # Example: ["billing-service","communication-service"] → 2 parallel jobs.
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs['affected-services']) }}
      # Run all matrix cells in parallel — no service depends on another's
      # build output in this pipeline (they're independently deployable).
      max-parallel: 6
      # Don't cancel sibling jobs if one fails — we want the full picture
      # of what's broken across the affected set.
      fail-fast: false

    permissions:
      contents: read
      # Required for actions/upload-artifact.
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          # Enable built-in Gradle cache via the setup-java cache key.
          # This is complementary to gradle/actions/setup-gradle below.
          cache: gradle

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          # ── Cache configuration ──────────────────────────────────────────
          # On main: read + push (establishes the authoritative cache).
          # On PRs/branches: read-only (consume cache, never pollute).
          #
          # This prevents a broken feature branch from poisoning the shared
          # cache with corrupt or partial build artifacts.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

          # Cache encryption key (optional but recommended for repos with
          # secrets in gradle.properties). Uncomment and set via repo secret:
          # cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

          # ── Dependency graph ────────────────────────────────────────────
          # Submit dependency graph for Dependabot alerts (requires
          # `dependency-graph: generate-and-submit` or `generate-and-upload`).
          dependency-graph: generate-and-upload

      - name: Compile & Test — ${{ matrix.service }}
        run: |
          ./gradlew :services:${{ matrix.service }}:build \
            --no-daemon \
            --build-cache \
            --configuration-cache \
            --parallel \
            -x spotlessCheck

      - name: Stage runner JAR — ${{ matrix.service }}
        shell: bash
        run: |
          set -euo pipefail

          SERVICE="${{ matrix.service }}"
          BUILD_LIBS="services/${SERVICE}/build/libs"

          # ── Locate the Quarkus runner JAR ───────────────────────────────
          # Quarkus Gradle plugin produces: <service>-<version>-runner.jar
          # We find it dynamically to avoid hardcoding versions.
          RUNNER_JAR=$(find "${BUILD_LIBS}" -maxdepth 1 -name '*-runner.jar' -type f | head -1)

          if [[ -z "${RUNNER_JAR}" ]]; then
            echo "::error::No runner JAR found in ${BUILD_LIBS}/"
            echo "Contents of build/libs:"
            ls -la "${BUILD_LIBS}/" 2>/dev/null || echo "(directory empty or missing)"
            exit 1
          fi

          echo "Found runner JAR: ${RUNNER_JAR}"

          # ── Normalize artifact name ─────────────────────────────────────
          # Convention: <service>-runner.jar (strip version prefix).
          # This gives downstream consumers a stable, predictable name.
          STAGED_NAME="${SERVICE}-runner.jar"
          STAGED_DIR="staged-artifacts"
          STAGED_PATH="${STAGED_DIR}/${STAGED_NAME}"

          mkdir -p "${STAGED_DIR}"
          cp "${RUNNER_JAR}" "${STAGED_PATH}"

          echo "Staged: ${STAGED_PATH}"
          echo "staged_path=${STAGED_PATH}" >> "$GITHUB_ENV"

      - name: Upload runner JAR artifact — ${{ matrix.service }}
        uses: actions/upload-artifact@v4
        with:
          # Artifact name includes the service for disambiguation.
          name: ${{ matrix.service }}-runner
          path: staged-artifacts/${{ matrix.service }}-runner.jar
          # ── Retention policy ────────────────────────────────────────────
          # 14-day retention balances debuggability with storage costs.
          # Failed builds can be inspected for two weeks; after that, the
          # artifact is automatically purged by GitHub.
          retention-days: 14
          # Fail the step if the artifact file is missing (defense-in-depth).
          if-no-files-found: error
          # Overwrite if re-running the same workflow (idempotent uploads).
          overwrite: true
