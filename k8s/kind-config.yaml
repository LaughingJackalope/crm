# Kind cluster configuration for local CRM development.
# Usage: kind create cluster --name crm --config k8s/kind-config.yaml
#
# This creates a single-node cluster with port mappings for:
#   - Kong API Gateway (all services routed through one entry point)
#   - Kafka
#   - Shared PostgreSQL
#   - Zookeeper
#
# Port mappings (host → cluster):
#   30080        → Kong proxy NodePort (all services via path routing)
#   9092         → Kafka
#   5432         → Shared PostgreSQL
#   2181         → Zookeeper
#   16686        → Jaeger UI (optional)
#   9090         → Prometheus (optional)
#   3000         → Grafana (optional)

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: crm
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # ── Kong API Gateway (single entry point for all services) ──────────
      - containerPort: 30080
        hostPort: 80
        protocol: TCP
      # ── Infrastructure ─────────────────────────────────────────────────
      - containerPort: 9092
        hostPort: 9092
        protocol: TCP
      - containerPort: 5432
        hostPort: 5432
        protocol: TCP
      - containerPort: 2181
        hostPort: 2181
        protocol: TCP
      # ── Observability (optional) ──────────────────────────────────────
      - containerPort: 30186
        hostPort: 16686
        protocol: TCP
