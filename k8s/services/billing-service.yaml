apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: billing-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgres:5432/crm"
            - name: QUARKUS_DATASOURCE_USERNAME
              value: "crm"
            - name: QUARKUS_DATASOURCE_PASSWORD
              value: "crm"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: QUARKUS_OIDC_ENABLED
              value: "false"
            - name: QUARKUS_HTTP_AUTH_PROACTIVE
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: crm
spec:
  selector:
    app: billing-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
